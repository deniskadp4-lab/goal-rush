<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ World Cup Goal Rush 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a1628; color: #e8f4e8; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #0d4a1a, #1a6b2e, #0d4a1a); padding: 20px 16px 0; text-align: center; border-bottom: 3px solid #2d8a3e; }
  .header .sub { font-size: 12px; color: #7ec98c; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
  .header h1 { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 4px; }
  .header .desc { font-size: 12px; color: #a8d5b0; margin-bottom: 16px; }

  .tabs { display: flex; justify-content: center; }
  .tab { padding: 8px 18px; background: transparent; color: #a8d5b0; border: none; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: 400; font-size: 13px; transition: all 0.2s; }
  .tab.active { background: #fff; color: #0d4a1a; font-weight: 700; }

  .content { padding: 16px; max-width: 640px; margin: 0 auto; }

  .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 11px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
  .card.top { background: linear-gradient(90deg, rgba(255,215,0,0.08), rgba(255,215,0,0.02)); border-color: rgba(255,215,0,0.2); }
  .rank { width: 28px; text-align: center; font-size: 13px; color: #7ec98c; font-weight: 700; flex-shrink: 0; }
  .rank.medal { font-size: 18px; }
  .info { flex: 1; }
  .info .pname { font-weight: 700; font-size: 15px; color: #e8f4e8; }
  .info .pname.gold { color: #ffd700; }
  .info .picks { font-size: 11px; color: #7ec98c; margin-top: 2px; }
  .pts-box { text-align: right; }
  .pts-box .pts { font-size: 22px; font-weight: 900; color: #5aba6e; }
  .pts-box .pts.gold { color: #ffd700; }
  .pts-box .lbl { font-size: 10px; color: #7ec98c; }

  .pick-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
  .pick-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .pick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
  .pick-row { display: flex; justify-content: space-between; align-items: center; border-radius: 6px; padding: 3px 6px; }
  .pick-row.earned { background: rgba(94,186,110,0.1); }
  .pick-team { font-size: 12px; color: #a8d5b0; }
  .pick-pts { font-size: 12px; font-weight: 700; color: #556b60; }
  .pick-pts.earned { color: #5aba6e; }
  .tiebreak { margin-top: 8px; font-size: 11px; color: #7ec98c; }

  .goal-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 10px 14px; margin-bottom: 6px; }
  .goal-team { font-size: 14px; font-weight: 600; }
  .goal-meta { font-size: 11px; color: #7ec98c; margin-left: 8px; }
  .goal-right { display: flex; align-items: center; gap: 10px; }
  .goal-count { font-size: 18px; font-weight: 900; color: #5aba6e; }
  .btn-minus, .btn-plus { border: none; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 16px; line-height: 1; }
  .btn-minus { background: rgba(255,255,255,0.08); color: #e8f4e8; }
  .btn-plus { background: #2d8a3e; color: #fff; }
  .note { margin-top: 16px; padding: 12px; background: rgba(255,215,0,0.05); border: 1px solid rgba(255,215,0,0.15); border-radius: 10px; font-size: 11px; color: #a8d5b0; }
  .sub-label { font-size: 11px; color: #7ec98c; margin-bottom: 8px; text-align: center; }
  .section-title { font-size: 13px; font-weight: 700; color: #a8d5b0; margin-bottom: 8px; }

  .sync-bar { display: flex; align-items: center; justify-content: space-between; background: rgba(45,138,62,0.12); border: 1px solid rgba(45,138,62,0.25); border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; }
  .sync-info { font-size: 12px; color: #a8d5b0; }
  .sync-info strong { color: #5aba6e; }
  .sync-info .last-update { font-size: 11px; color: #556b60; margin-top: 2px; }
  .btn-sync { background: #2d8a3e; color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .btn-sync:disabled { opacity: 0.5; cursor: not-allowed; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-left: 6px; }
  .status-live { background: rgba(255,80,80,0.2); color: #ff6b6b; }
  .status-ft { background: rgba(94,186,110,0.15); color: #5aba6e; }
  .status-sched { background: rgba(168,213,176,0.1); color: #7ec98c; }

  .editor-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .editor-box label { font-size: 13px; font-weight: 700; color: #a8d5b0; display: block; margin-bottom: 10px; }
  .editor-row { display: flex; gap: 8px; margin-bottom: 8px; }
  select, input[type=number] { background: #0d2a14; color: #e8f4e8; border: 1px solid #2d8a3e; border-radius: 8px; padding: 8px 10px; font-size: 13px; }
  select { flex: 1; }
  input[type=number] { width: 72px; text-align: center; }
  .btn-set { background: #2d8a3e; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; }

  .match-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 9px 14px; margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; }
  .match-teams { font-size: 13px; color: #c8e6cc; }
  .match-score { font-size: 14px; font-weight: 700; color: #5aba6e; min-width: 44px; text-align: center; }
  .match-status-txt { font-size: 10px; color: #7ec98c; text-align: right; min-width: 48px; }
  .matches-section { margin-bottom: 14px; }
  .matches-section .section-title { margin-bottom: 6px; }
</style>
</head>
<body>

<div class="header">
  <div class="sub">⚽ FIFA World Cup 2026</div>
  <h1>Goal Rush Leaderboard</h1>
  <div class="desc">Live scores auto-updated from official data</div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('leaderboard')">🏆 Leaderboard</button>
    <button class="tab" onclick="showTab('picks')">👥 All Picks</button>
    <button class="tab" onclick="showTab('goals')">⚽ Live Scores</button>
  </div>
</div>

<div class="content">
  <div id="tab-leaderboard"></div>
  <div id="tab-picks" style="display:none"></div>
  <div id="tab-goals" style="display:none"></div>
</div>

<script>
const POT_PTS = {1:3, 2:6, 3:9, 4:12};
const TEAM_POT = {
  Argentina:1,France:1,Spain:1,England:1,Brazil:1,Portugal:1,Netherlands:1,Belgium:1,Germany:1,Croatia:1,Uruguay:1,Colombia:1,
  "United States":2,Mexico:2,Japan:2,Morocco:2,Switzerland:2,Senegal:2,Iran:2,Sweden:2,Austria:2,"South Korea":2,Norway:2,Canada:2,
  Paraguay:3,Czechia:3,Scotland:3,Egypt:3,"Ivory Coast":3,Algeria:3,Tunisia:3,"Saudi Arabia":3,Ecuador:3,Qatar:3,Turkey:3,Ghana:3,
  "New Zealand":4,Haiti:4,Jordan:4,Iraq:4,Uzbekistan:4,"DR Congo":4,Curacao:4,"Bosnia and Herzegovina":4,"Cape Verde":4,"South Africa":4,Australia:4,Panama:4
};
const FLAGS = {
  France:"🇫🇷",Spain:"🇪🇸",England:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",Portugal:"🇵🇹",Germany:"🇩🇪",Brazil:"🇧🇷",Argentina:"🇦🇷",
  Netherlands:"🇳🇱",Belgium:"🇧🇪",Croatia:"🇭🇷",Uruguay:"🇺🇾",Colombia:"🇨🇴",
  "United States":"🇺🇸",Mexico:"🇲🇽",Japan:"🇯🇵",Morocco:"🇲🇦",Switzerland:"🇨🇭",
  Senegal:"🇸🇳",Iran:"🇮🇷",Sweden:"🇸🇪",Austria:"🇦🇹","South Korea":"🇰🇷",Norway:"🇳🇴",Canada:"🇨🇦",
  Paraguay:"🇵🇾",Czechia:"🇨🇿",Scotland:"🏴󠁧󠁢󠁳󠁣󠁴󠁿",Egypt:"🇪🇬","Ivory Coast":"🇨🇮",
  Algeria:"🇩🇿",Tunisia:"🇹🇳","Saudi Arabia":"🇸🇦",Ecuador:"🇪🇨",Qatar:"🇶🇦",Turkey:"🇹🇷",Ghana:"🇬🇭",
  "New Zealand":"🇳🇿",Haiti:"🇭🇹",Jordan:"🇯🇴",Iraq:"🇮🇶",Uzbekistan:"🇺🇿",
  "DR Congo":"🇨🇩",Curacao:"🇨🇼","Bosnia and Herzegovina":"🇧🇦","Cape Verde":"🇨🇻",
  "South Africa":"🇿🇦",Australia:"🇦🇺",Panama:"🇵🇦"
};

// Map SportRadar / common name variants → our internal names
const TEAM_ALIASES = {
  "Côte d'Ivoire":"Ivory Coast","Cote d'Ivoire":"Ivory Coast","Ivory Coast":"Ivory Coast",
  "USA":"United States","United States of America":"United States","US":"United States",
  "South Korea":"South Korea","Korea Republic":"South Korea","Korea Rep.":"South Korea",
  "DR Congo":"DR Congo","Congo DR":"DR Congo","Democratic Republic of the Congo":"DR Congo",
  "Bosnia & Herzegovina":"Bosnia and Herzegovina","Bosnia-Herzegovina":"Bosnia and Herzegovina",
  "Cape Verde":"Cape Verde","Czechia":"Czechia","Czech Republic":"Czechia",
  "New Zealand":"New Zealand","Curacao":"Curacao","Curaçao":"Curacao"
};

function normalizeTeamName(raw) {
  if (!raw) return raw;
  if (TEAM_POT[raw]) return raw;
  if (TEAM_ALIASES[raw]) return TEAM_ALIASES[raw];
  // fuzzy: try trimmed
  const t = raw.trim();
  if (TEAM_POT[t]) return t;
  if (TEAM_ALIASES[t]) return TEAM_ALIASES[t];
  return raw;
}

const PARTICIPANTS = [
  {name:"Paddy",     p1:"France",   p2:"Norway",     p3:"Ivory Coast",  p4:"Bosnia and Herzegovina", tb:"France"},
  {name:"Denis",     p1:"France",   p2:"Japan",      p3:"Ivory Coast",  p4:"Australia",              tb:"France"},
  {name:"Andrei",    p1:"Portugal", p2:"Norway",     p3:"Turkey",       p4:"Australia",              tb:"Portugal"},
  {name:"Bren Jnr",  p1:"England",  p2:"Japan",      p3:"Turkey",       p4:"Australia",              tb:"Spain"},
  {name:"Stephen",   p1:"France",   p2:"Morocco",    p3:"Turkey",       p4:"Australia",              tb:"Portugal"},
  {name:"Flavius",   p1:"France",   p2:"Switzerland",p3:"Saudi Arabia", p4:"Bosnia and Herzegovina", tb:"France"},
  {name:"Louise",    p1:"Spain",    p2:"Mexico",     p3:"Egypt",        p4:"Australia",              tb:"France"},
  {name:"Emma",      p1:"France",   p2:"Morocco",    p3:"Ivory Coast",  p4:"Bosnia and Herzegovina", tb:"France"},
  {name:"Julie 1",   p1:"Spain",    p2:"Switzerland",p3:"Turkey",       p4:"Bosnia and Herzegovina", tb:"Spain"},
  {name:"Julie 2",   p1:"Spain",    p2:"Japan",      p3:"Turkey",       p4:"Australia",              tb:"Spain"},
  {name:"Ian",       p1:"Argentina",p2:"Mexico",     p3:"Czechia",      p4:"Australia",              tb:"Argentina"},
  {name:"Anto Ivers",p1:"Brazil",   p2:"Senegal",    p3:"Czechia",      p4:"South Africa",           tb:"Brazil"},
  {name:"Dave",      p1:"France",   p2:"Sweden",     p3:"Czechia",      p4:"Bosnia and Herzegovina", tb:"Portugal"},
  {name:"Ronaldo",   p1:"France",   p2:"Norway",     p3:"Ivory Coast",  p4:"Bosnia and Herzegovina", tb:"Brazil"},
  {name:"Cillian",   p1:"France",   p2:"Norway",     p3:"Ivory Coast",  p4:"Australia",              tb:"France"},
  {name:"Bren 2",    p1:"Spain",    p2:"Morocco",    p3:"Paraguay",     p4:"South Africa",           tb:"Spain"},
  {name:"Jess",      p1:"Spain",    p2:"Switzerland",p3:"Ecuador",      p4:"Bosnia and Herzegovina", tb:"Spain"},
  {name:"Barbara",   p1:"Spain",    p2:"Morocco",    p3:"Ivory Coast",  p4:"Bosnia and Herzegovina", tb:"Spain"},
  {name:"Conor",     p1:"Spain",    p2:"Switzerland",p3:"Ghana",        p4:"South Africa",           tb:"Portugal"},
  {name:"Dermot",    p1:"Spain",    p2:"Norway",     p3:"Turkey",       p4:"DR Congo",               tb:"Spain"},
  {name:"Dan",       p1:"France",   p2:"Morocco",    p3:"Scotland",     p4:"Australia",              tb:"France"},
  {name:"Brendan Snr",p1:"Spain",   p2:"Norway",     p3:"Egypt",        p4:"Australia",              tb:"Spain"},
  {name:"Leah",      p1:"Germany",  p2:"Sweden",     p3:"Czechia",      p4:"Jordan",                 tb:"Germany"},
  {name:"Ant Kav",   p1:"England",  p2:"Senegal",    p3:"Ecuador",      p4:"New Zealand",            tb:"Spain"},
  {name:"Oisin",     p1:"France",   p2:"Norway",     p3:"Turkey",       p4:"Bosnia and Herzegovina", tb:"Brazil"},
  {name:"Fran",      p1:"Brazil",   p2:"Norway",     p3:"Scotland",     p4:"Bosnia and Herzegovina", tb:"Brazil"},
  {name:"Joe",       p1:"Spain",    p2:"Morocco",    p3:"Ecuador",      p4:"Australia",              tb:"Spain"},
  {name:"Eimhin",    p1:"Spain",    p2:"Norway",     p3:"Ecuador",      p4:"Australia",              tb:"Spain"},
  {name:"Gary",      p1:"Brazil",   p2:"Mexico",     p3:"Turkey",       p4:"Panama",                 tb:"Portugal"},
  {name:"Gorkem",    p1:"France",   p2:"Norway",     p3:"Turkey",       p4:"Australia",              tb:"France"},
];

// goals: { teamName: goalsScored }
let goals = {};
let liveMatches = [];
let lastSync = null;
let syncing = false;

function loadLocal() {
  try {
    const saved = localStorage.getItem("goalRush2026v2");
    if (saved) {
      const d = JSON.parse(saved);
      goals = d.goals || {};
      lastSync = d.lastSync || null;
    }
  } catch(e) {}
}

function saveLocal() {
  try {
    localStorage.setItem("goalRush2026v2", JSON.stringify({goals, lastSync}));
  } catch(e) {}
}

loadLocal();

// ─── AUTO-SYNC via Claude API + SportRadar tool ───────────────────────────────

async function fetchLiveScores() {
  if (syncing) return;
  syncing = true;
  updateSyncButton(true);

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: `You are a data extraction assistant. The user will ask for World Cup 2026 scores.
Use the web_search tool to find current FIFA World Cup 2026 match results.
Search for "FIFA World Cup 2026 results scores today" and extract ALL completed or in-progress matches.

Return ONLY a valid JSON object (no markdown, no explanation) in this exact format:
{
  "matches": [
    {"home": "TeamName", "away": "TeamName", "homeGoals": 2, "awayGoals": 1, "status": "FT"},
    ...
  ],
  "timestamp": "ISO date string"
}

Status values: "FT" for finished, "LIVE" for in progress, "NS" for not started.
Use full English country names (e.g. "Ivory Coast" not "Côte d'Ivoire", "South Korea" not "Korea Republic").
Only include matches that have started or are finished. Do not include upcoming matches with no score.`,
        messages: [{role: "user", content: "Get all FIFA World Cup 2026 match scores right now."}],
        tools: [{type: "web_search_20250305", name: "web_search"}]
      })
    });

    const data = await resp.json();

    // Extract text from all content blocks
    let text = "";
    if (data.content) {
      for (const block of data.content) {
        if (block.type === "text") text += block.text;
      }
    }

    // Parse JSON from response
    const jsonMatch = text.match(/\{[\s\S]*"matches"[\s\S]*\}/);
    if (jsonMatch) {
      const parsed = JSON.parse(jsonMatch[0]);
      if (parsed.matches && Array.isArray(parsed.matches)) {
        processMatches(parsed.matches);
        lastSync = new Date().toISOString();
        saveLocal();
      }
    }
  } catch(e) {
    console.error("Sync failed:", e);
  }

  syncing = false;
  updateSyncButton(false);
  render();
}

function processMatches(matches) {
  // Reset goals for all teams (will rebuild from matches)
  const newGoals = {};
  const newMatches = [];

  for (const m of matches) {
    const home = normalizeTeamName(m.home);
    const away = normalizeTeamName(m.away);
    const hg = parseInt(m.homeGoals) || 0;
    const ag = parseInt(m.awayGoals) || 0;
    const status = m.status || "FT";

    // Only count goals from finished or live games (not NS)
    if (status !== "NS") {
      // Accumulate (a team may play multiple matches)
      newGoals[home] = (newGoals[home] || 0) + hg;
      newGoals[away] = (newGoals[away] || 0) + ag;
    }

    newMatches.push({home, away, hg, ag, status});
  }

  goals = newGoals;
  liveMatches = newMatches;
}

function updateSyncButton(loading) {
  const btn = document.getElementById("syncBtn");
  if (!btn) return;
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = `<span class="spin">⟳</span> Updating...`;
  } else {
    btn.disabled = false;
    btn.innerHTML = `⟳ Refresh`;
  }
}

// ─── Scoring ──────────────────────────────────────────────────────────────────

function calcPts(p) {
  return [p.p1,p.p2,p.p3,p.p4].reduce((s,t) =>
    s + (goals[t]||0) * POT_PTS[TEAM_POT[t]], 0);
}

function f(team) { return (FLAGS[team]||"") + " " + team; }

function getLeaderboard() {
  return PARTICIPANTS
    .map(p => ({...p, pts: calcPts(p)}))
    .sort((a,b) => b.pts - a.pts || a.name.localeCompare(b.name));
}

function fmtSync() {
  if (!lastSync) return "Never synced";
  const d = new Date(lastSync);
  return "Updated " + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

// ─── Tab rendering ────────────────────────────────────────────────────────────

let activeTab = "leaderboard";
function showTab(tab) {
  activeTab = tab;
  ["leaderboard","picks","goals"].forEach(t => {
    document.getElementById("tab-"+t).style.display = t===tab ? "block" : "none";
    document.querySelectorAll(".tab").forEach((el,i) => {
      const tabs = ["leaderboard","picks","goals"];
      el.classList.toggle("active", tabs[i]===tab);
    });
  });
  render();
}

function render() {
  if (activeTab==="leaderboard") renderLeaderboard();
  else if (activeTab==="picks") renderPicks();
  else renderGoals();
}

function syncBar() {
  const liveCount = liveMatches.filter(m => m.status === "LIVE").length;
  const liveBadge = liveCount > 0 ? `<span class="status-badge status-live">● ${liveCount} LIVE</span>` : "";
  return `<div class="sync-bar">
    <div class="sync-info">
      <div><strong>Live Scores</strong> Auto-sync ${liveBadge}</div>
      <div class="last-update">${fmtSync()}</div>
    </div>
    <button class="btn-sync" id="syncBtn" onclick="fetchLiveScores()">⟳ Refresh</button>
  </div>`;
}

function renderLeaderboard() {
  const lb = getLeaderboard();
  let rank = 1, html = syncBar();
  lb.forEach((p,i) => {
    if (i>0 && lb[i-1].pts !== p.pts) rank = i+1;
    const medal = rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":null;
    const isTop = rank<=3;
    html += `<div class="card ${isTop?'top':''}">
      <div class="rank ${medal?'medal':''}">${medal||"#"+rank}</div>
      <div class="info">
        <div class="pname ${isTop?'gold':''}">${p.name}</div>
        <div class="picks">${f(p.p1)} · ${f(p.p2)} · ${f(p.p3)} · ${f(p.p4)}</div>
      </div>
      <div class="pts-box">
        <div class="pts ${isTop?'gold':''}">${p.pts}</div>
        <div class="lbl">pts</div>
      </div>
    </div>`;
  });
  document.getElementById("tab-leaderboard").innerHTML = html;
  updateSyncButton(syncing);
}

function renderPicks() {
  const lb = getLeaderboard();
  let html = `<div class="sub-label">Pot 1 = 3pts/goal · Pot 2 = 6pts/goal · Pot 3 = 9pts/goal · Pot 4 = 12pts/goal</div>` + syncBar();
  lb.forEach(p => {
    const teams = [[p.p1,"Pot 1"],[p.p2,"Pot 2"],[p.p3,"Pot 3"],[p.p4,"Pot 4"]];
    let rows = "";
    teams.forEach(([t, pot]) => {
      const g = goals[t]||0, e = g * POT_PTS[TEAM_POT[t]];
      rows += `<div class="pick-row ${e>0?'earned':''}">
        <span class="pick-team">${f(t)}</span>
        <span class="pick-pts ${e>0?'earned':''}">+${e}</span>
      </div>`;
    });
    html += `<div class="pick-card">
      <div class="pick-header">
        <span style="font-weight:700;font-size:15px">${p.name}</span>
        <span style="font-weight:900;font-size:18px;color:#5aba6e">${p.pts} pts</span>
      </div>
      <div class="pick-grid">${rows}</div>
      <div class="tiebreak">🏆 Tiebreaker: ${f(p.tb)}</div>
    </div>`;
  });
  document.getElementById("tab-picks").innerHTML = html;
  updateSyncButton(syncing);
}

function renderGoals() {
  // Matches section
  let matchesHtml = "";
  if (liveMatches.length > 0) {
    const live = liveMatches.filter(m => m.status === "LIVE");
    const finished = liveMatches.filter(m => m.status === "FT");

    if (live.length) {
      matchesHtml += `<div class="matches-section"><div class="section-title">🔴 Live Now</div>`;
      live.forEach(m => {
        matchesHtml += `<div class="match-card">
          <div class="match-teams">${FLAGS[m.home]||""} ${m.home} vs ${FLAGS[m.away]||""} ${m.away}</div>
          <div class="match-score">${m.hg} – ${m.ag}</div>
          <div class="match-status-txt"><span class="status-badge status-live">LIVE</span></div>
        </div>`;
      });
      matchesHtml += `</div>`;
    }

    if (finished.length) {
      matchesHtml += `<div class="matches-section"><div class="section-title">✅ Finished</div>`;
      finished.forEach(m => {
        matchesHtml += `<div class="match-card">
          <div class="match-teams">${FLAGS[m.home]||""} ${m.home} vs ${FLAGS[m.away]||""} ${m.away}</div>
          <div class="match-score">${m.hg} – ${m.ag}</div>
          <div class="match-status-txt"><span class="status-badge status-ft">FT</span></div>
        </div>`;
      });
      matchesHtml += `</div>`;
    }
  }

  // Goals tally
  const scored = Object.entries(goals).filter(([,g]) => g>0).sort((a,b) => b[1]-a[1]);
  let rows = scored.length
    ? scored.map(([t,g]) => `
      <div class="goal-row">
        <div>
          <span class="goal-team">${FLAGS[t]||""} ${t}</span>
          <span class="goal-meta">Pot ${TEAM_POT[t]} · ${POT_PTS[TEAM_POT[t]]}pts/goal</span>
        </div>
        <div class="goal-right">
          <span class="goal-count">${g} ⚽</span>
          <button class="btn-minus" onclick="adjustGoal('${t}',-1)">−</button>
          <button class="btn-plus" onclick="adjustGoal('${t}',1)">+</button>
        </div>
      </div>`).join("")
    : `<div style="color:#556b60;font-size:13px;text-align:center;padding:20px">No goals recorded yet — press Refresh to sync</div>`;

  // Manual override selector
  const allTeams = Object.keys(TEAM_POT).sort();
  let opts = allTeams.map(t => `<option value="${t}">${FLAGS[t]||""} ${t} (Pot ${TEAM_POT[t]})</option>`).join("");

  document.getElementById("tab-goals").innerHTML = `
    ${syncBar()}
    ${matchesHtml}
    <div class="section-title">Goals Tally (auto-computed from matches)</div>
    ${rows}
    <div class="editor-box" style="margin-top:16px">
      <label>✏️ Manual Override (if needed)</label>
      <div class="editor-row">
        <select id="editTeam"><option value="">Select team...</option>${opts}</select>
        <input type="number" id="editVal" min="0" placeholder="Goals">
        <button class="btn-set" onclick="setGoal()">Set</button>
      </div>
    </div>
    <div class="note">ℹ️ Penalty shootout goals do NOT count · Only regular time & extra time goals · Auto-sync fetches live data from the web</div>`;
  updateSyncButton(syncing);
}

function setGoal() {
  const t = document.getElementById("editTeam").value;
  const v = parseInt(document.getElementById("editVal").value);
  if (t && !isNaN(v) && v>=0) {
    goals[t] = v;
    if (v===0) delete goals[t];
    saveLocal();
    render();
  }
}

function adjustGoal(team, delta) {
  goals[team] = Math.max(0, (goals[team]||0) + delta);
  if (goals[team]===0) delete goals[team];
  saveLocal();
  render();
}

// Initial render then auto-sync
render();
fetchLiveScores();

// Auto-refresh every 3 minutes while page is open
setInterval(fetchLiveScores, 3 * 60 * 1000);
</script>
</body>
</html>
