<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallagher · Goal Rush 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --green-0:#0a2420; --green-1:#0d2e28; --green-2:#103a32; --green-line:#1c4a40;
    --copper-1:#e8a87c; --copper-2:#c87f4e; --copper-3:#a35f33; --copper-soft:#d9a06f;
    --ink:#eaf3ee; --muted:#9bc2ad; --dim:#5d7d6e;
    --gold:#e3b878;
  }
  body { background:
      radial-gradient(120% 90% at 50% -10%, #114038 0%, var(--green-1) 45%, var(--green-0) 100%) fixed,
      var(--green-0);
    color: var(--ink); font-family: 'Segoe UI', sans-serif; min-height: 100vh; position: relative; overflow-x: hidden; }
  /* faint crest watermark behind everything */
  body::before{
    content:""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='420' height='480' viewBox='0 0 420 480'><g fill='none' stroke='%23c87f4e' stroke-width='6' stroke-linejoin='round' stroke-linecap='round' opacity='1'><path d='M40 70 L380 70 L380 300 Q380 430 210 470 Q40 430 40 300 Z'/><circle cx='185' cy='250' r='95'/><path d='M150 150 L150 175 L120 175 L120 150 M120 162 L150 162'/><path d='M150 150 L255 150 L300 120 L300 185'/><path d='M255 150 Q235 200 200 215'/><path d='M150 345 L150 175'/><path d='M300 200 Q315 230 300 270 Q288 300 300 330 L300 360'/><text x='325' y='150' font-family='Georgia' font-size='62' fill='%23c87f4e' stroke='none'>G</text></g></svg>");
    background-repeat: no-repeat; background-position: center 120px; background-size: 460px auto;
    opacity: 0.05;
  }
  .content, .header { position: relative; z-index: 1; }

  .header { background:
      linear-gradient(135deg, var(--green-2) 0%, #14463c 50%, var(--green-1) 100%);
    padding: 18px 16px 0; text-align: center; border-bottom: 1px solid var(--green-line);
    box-shadow: 0 6px 24px rgba(0,0,0,0.35); }
  .crest { width: 62px; height: auto; margin: 0 auto 8px; display: block; filter: drop-shadow(0 3px 8px rgba(0,0,0,0.45)); }
  .crest path, .crest circle, .crest text { stroke: url(#cg); }
  .brandname { font-family: Georgia, 'Times New Roman', serif; font-size: 22px; font-weight: 700; letter-spacing: 7px; color: #f3ece2; margin-bottom: 1px; padding-left: 7px; }
  .brandsub { font-size: 9.5px; color: var(--copper-soft); letter-spacing: 5px; margin-bottom: 3px; }
  .header h1 { font-size: 15px; font-weight: 600; color: var(--muted); margin-bottom: 3px; letter-spacing: 0.5px; }
  .header .desc { font-size: 11px; color: var(--dim); margin-bottom: 14px; letter-spacing: 0.5px; }
  .tabs { display: flex; justify-content: center; flex-wrap: wrap; gap: 2px; }
  .tab { padding: 8px 14px; background: transparent; color: var(--muted); border: none; border-radius: 9px 9px 0 0; cursor: pointer; font-weight: 500; font-size: 12.5px; transition: all 0.2s; }
  .tab.active { background: linear-gradient(180deg, #fbf6ef, #efe4d6); color: #0d2e28; font-weight: 700; }
  .content { padding: 16px; max-width: 640px; margin: 0 auto; }

  .lb-item { margin-bottom: 7px; }
  .card { background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); border: 1px solid var(--green-line); border-radius: 11px; padding: 11px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: border-color 0.2s, transform 0.1s; }
  .card:active { transform: scale(0.995); }
  .card.top { background: linear-gradient(90deg, rgba(200,127,78,0.14), rgba(200,127,78,0.03)); border-color: rgba(216,160,111,0.35); }
  .card.open { border-radius: 11px 11px 0 0; }
  .rank { width: 28px; text-align: center; font-size: 13px; color: var(--copper-soft); font-weight: 700; flex-shrink: 0; }
  .rank.medal { font-size: 18px; }
  .info { flex: 1; min-width: 0; }
  .info .pname { font-weight: 700; font-size: 15px; color: var(--ink); }
  .info .pname.gold { color: var(--gold); }
  .info .picks { font-size: 11px; color: var(--muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pts-box { text-align: right; flex-shrink: 0; }
  .pts-box .pts { font-size: 22px; font-weight: 900; color: var(--copper-1); }
  .pts-box .pts.gold { color: var(--gold); }
  .pts-box .lbl { font-size: 10px; color: var(--dim); }
  .exp-caret { font-size: 12px; color: var(--copper-soft); margin-left: 4px; flex-shrink: 0; }
  .mv { font-size: 11px; font-weight: 800; min-width: 30px; text-align: center; flex-shrink: 0; }
  .mv.up { color: #6fcf97; }
  .mv.down { color: #e08070; }
  .mv.same { color: var(--dim); }
  .mv.newp { color: var(--copper-soft); }
  .snap-bar { background: rgba(255,255,255,0.03); border: 1px solid var(--green-line); border-radius: 9px; padding: 8px 12px; margin-bottom: 10px; font-size: 11px; color: var(--muted); text-align: center; }
  .lb-detail { background: rgba(0,0,0,0.18); border: 1px solid var(--green-line); border-top: none; border-radius: 0 0 11px 11px; padding: 10px 14px 12px; animation: slideDown 0.25s ease-out; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .det-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .det-row:last-of-type { border-bottom: none; }
  .det-pot { color: var(--copper-soft); font-size: 10px; font-weight: 700; width: 38px; flex-shrink: 0; }
  .det-team { flex: 1; color: #cfe6d8; padding: 0 6px; }
  .det-calc { color: var(--muted); font-size: 11px; white-space: nowrap; }
  .det-calc b { color: var(--copper-1); font-size: 12.5px; }
  .det-foot { margin-top: 9px; padding-top: 9px; border-top: 1px solid rgba(216,160,111,0.2); font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .det-foot b { color: var(--gold); }
  /* Champion */
  .card.champion { position: relative; overflow: hidden;
    background: linear-gradient(90deg, rgba(200,127,78,0.2), rgba(227,184,120,0.05));
    border: 1px solid rgba(227,184,120,0.55);
    animation: championGlow 2.4s ease-in-out infinite; }
  .card.champion > * { position: relative; z-index: 1; }
  .card.champion::before { content:""; position:absolute; top:0; left:0; width:50%; height:100%; pointer-events:none;
    background: linear-gradient(100deg, transparent, rgba(245,210,160,0.4), transparent);
    z-index:0; animation: shimmerSweep 3.4s ease-in-out infinite; }
  @keyframes championGlow {
    0%,100% { box-shadow: 0 0 8px rgba(216,160,111,0.25); border-color: rgba(216,160,111,0.45); }
    50% { box-shadow: 0 0 22px rgba(232,168,124,0.6); border-color: rgba(232,168,124,0.85); } }
  @keyframes shimmerSweep {
    0% { transform: translateX(-220%) skewX(-20deg); }
    45%,100% { transform: translateX(360%) skewX(-20deg); } }
  .card.just-crowned { animation: championGlow 2.4s ease-in-out infinite, crownPop 0.8s ease-out; }
  @keyframes crownPop { 0% { transform: scale(0.9); } 45% { transform: scale(1.05); } 75% { transform: scale(0.99); } 100% { transform: scale(1); } }

  /* ===== PODIUM REVEAL (top-3 entry animation) ===== */
  @keyframes podiumIn {
    0%   { opacity:0; transform: translateY(18px) scale(0.96); }
    60%  { opacity:1; transform: translateY(-3px) scale(1.02); }
    100% { opacity:1; transform: translateY(0) scale(1); }
  }
  @keyframes podiumFlash {
    0%   { box-shadow: 0 0 0 rgba(227,184,120,0); }
    40%  { box-shadow: 0 0 26px rgba(227,184,120,0.75); }
    100% { box-shadow: 0 0 0 rgba(227,184,120,0); }
  }
  @keyframes medalPop {
    0%   { transform: scale(0) rotate(-25deg); }
    70%  { transform: scale(1.25) rotate(6deg); }
    100% { transform: scale(1) rotate(0); }
  }
  .card.reveal { animation: podiumIn 0.55s cubic-bezier(.2,.8,.3,1.2) backwards,
                            podiumFlash 1.1s ease-out backwards; }
  .card.reveal.r3 { animation-delay: 0.05s, 0.05s; }
  .card.reveal.r2 { animation-delay: 0.30s, 0.30s; }
  .card.reveal.r1 { animation-delay: 0.55s, 0.55s; }
  /* champion card keeps its glow/shimmer: re-declare so reveal wins on entry */
  .card.champion.reveal { animation: podiumIn 0.55s cubic-bezier(.2,.8,.3,1.2) backwards,
                                     championGlow 2.4s ease-in-out infinite 0.6s; }
  .card.champion.reveal.r1 { animation-delay: 0.55s, 1.1s; }
  .card.reveal .rank.medal { animation: medalPop 0.5s ease-out backwards; }
  .card.reveal.r3 .rank.medal { animation-delay: 0.25s; }
  .card.reveal.r2 .rank.medal { animation-delay: 0.50s; }
  .card.reveal.r1 .rank.medal { animation-delay: 0.75s; }
  @media (prefers-reduced-motion: reduce){
    .card.reveal, .card.champion.reveal, .card.reveal .rank.medal { animation: none !important; }
  }

  .goal-row { display: flex; align-items: center; justify-content: space-between; background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); border: 1px solid var(--green-line); border-radius: 9px; padding: 10px 14px; margin-bottom: 6px; }
  .goal-team { font-size: 14px; font-weight: 600; }
  .goal-meta { font-size: 11px; color: var(--copper-soft); margin-left: 8px; }
  .goal-right { display: flex; align-items: center; gap: 10px; }
  .goal-count { font-size: 18px; font-weight: 900; color: var(--copper-1); }
  .btn-minus, .btn-plus { border: none; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 16px; line-height: 1; }
  .btn-minus { background: rgba(255,255,255,0.08); color: var(--ink); }
  .btn-plus { background: var(--copper-3); color: #fff; }
  .note { margin-top: 16px; padding: 12px; background: rgba(200,127,78,0.07); border: 1px solid rgba(216,160,111,0.2); border-radius: 10px; font-size: 11px; color: var(--muted); line-height: 1.5; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--copper-soft); margin-bottom: 8px; letter-spacing: 0.5px; }
  .sync-bar { display: flex; align-items: center; justify-content: space-between; background: rgba(200,127,78,0.08); border: 1px solid rgba(216,160,111,0.2); border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; }
  .sync-info { font-size: 12px; color: var(--muted); }
  .sync-info strong { color: var(--copper-1); }
  .sync-time { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .sync-error { font-size: 11px; color: #e08070; margin-top: 2px; }
  .btn-sync { background: linear-gradient(180deg, var(--copper-2), var(--copper-3)); color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .btn-sync:disabled { opacity: 0.5; cursor: not-allowed; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .match-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); border: 1px solid var(--green-line); border-radius: 7px; padding: 8px 12px; margin-bottom: 4px; font-size: 13px; }
  .match-teams { color: #cfe6d8; flex: 1; }
  .match-score { font-weight: 700; color: var(--copper-1); min-width: 44px; text-align: center; }
  .match-date { font-size: 10px; color: var(--dim); min-width: 60px; text-align: right; }
  .editor-box { background: rgba(255,255,255,0.04); border: 1px solid var(--green-line); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .editor-box label { font-size: 13px; font-weight: 700; color: var(--copper-soft); display: block; margin-bottom: 10px; }
  .editor-row { display: flex; gap: 8px; margin-bottom: 8px; }
  select, input[type=number] { background: var(--green-0); color: var(--ink); border: 1px solid var(--copper-3); border-radius: 8px; padding: 8px 10px; font-size: 13px; }
  select { flex: 1; }
  input[type=number] { width: 72px; text-align: center; }
  .btn-set { background: linear-gradient(180deg, var(--copper-2), var(--copper-3)); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; }
  /* Predictor */
  .pred-intro { background: linear-gradient(135deg, rgba(200,127,78,0.12), rgba(16,58,50,0.4)); border: 1px solid rgba(216,160,111,0.22); border-radius: 12px; padding: 13px 14px; margin-bottom: 12px; font-size: 12px; color: var(--muted); line-height: 1.55; }
  .pred-intro b { color: #f3ece2; }
  .pred-verdict { background: rgba(227,184,120,0.08); border-left: 3px solid var(--gold); border-radius: 7px; padding: 12px 14px; margin-bottom: 14px; font-size: 13.5px; color: #f3f0e8; line-height: 1.5; }
  .calib-bar { display: flex; align-items: center; justify-content: space-between; background: rgba(200,127,78,0.07); border: 1px solid rgba(216,160,111,0.18); border-radius: 9px; padding: 7px 12px; margin-bottom: 12px; font-size: 11px; }
  .calib-status { color: var(--copper-soft); }
  .btn-recalib { background: rgba(163,95,51,0.5); color: #f0d6bf; border: none; border-radius: 7px; padding: 5px 11px; font-size: 11px; font-weight: 700; cursor: pointer; }
  .pred-top { background: linear-gradient(90deg, rgba(227,184,120,0.16), rgba(227,184,120,0.03)); border: 1px solid rgba(227,184,120,0.35); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; text-align: center; }
  .pred-top-lbl { font-size: 11px; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; }
  .pred-top-name { font-size: 26px; font-weight: 900; color: var(--gold); margin: 2px 0; }
  .pred-top-sub { font-size: 13px; color: var(--muted); }
  .pred-row-card { background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); border: 1px solid var(--green-line); border-radius: 10px; padding: 10px 14px; margin-bottom: 6px; }
  .pred-row-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .pred-rank { width: 22px; text-align: center; font-size: 12px; color: var(--copper-soft); font-weight: 700; }
  .pred-name { flex: 1; font-weight: 700; font-size: 14px; }
  .pred-pct { font-size: 16px; font-weight: 900; }
  .pred-exp { font-size: 11px; color: var(--copper-soft); }
  .pred-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .pred-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .pred-toggle { width: 100%; margin-top: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--green-line); border-radius: 10px; padding: 11px; color: var(--muted); font-size: 13px; font-weight: 700; cursor: pointer; }
  .str-help { font-size: 11px; color: var(--copper-soft); margin: 10px 0; line-height: 1.5; }
  .str-help b { color: var(--muted); }
  .pot-label { font-size: 11px; color: var(--copper-1); font-weight: 700; margin: 12px 0 4px; }
  .str-row { display: flex; align-items: center; justify-content: space-between; border-radius: 7px; padding: 6px 10px; margin-bottom: 4px; font-size: 12.5px; }
  .str-row.active { background: rgba(255,255,255,0.03); }
  .str-row.elim { background: rgba(255,255,255,0.01); opacity: 0.45; }
  .str-ctrl { display: flex; align-items: center; gap: 6px; }
  .str-val { font-size: 13px; font-weight: 700; color: var(--copper-1); width: 34px; text-align: center; }
  .str-ctrl .btn-minus, .str-ctrl .btn-plus { width: 24px; height: 24px; font-size: 15px; border-radius: 5px; }
  .tag-auto { font-size: 9px; color: #6fcf97; font-weight: 700; background: rgba(111,207,151,0.13); padding: 1px 4px; border-radius: 3px; margin-left: 4px; }
  .tag-manual { font-size: 9px; color: var(--gold); font-weight: 700; background: rgba(227,184,120,0.15); padding: 1px 4px; border-radius: 3px; margin-left: 4px; }
  .tag-elim { font-size: 9px; color: var(--dim); font-weight: 700; background: rgba(93,125,110,0.2); padding: 1px 4px; border-radius: 3px; margin-left: 4px; }
  .meta-mini { font-size: 9.5px; color: var(--dim); margin-left: 4px; }
  .btn-reset { background: rgba(227,184,120,0.2); color: var(--gold); border: none; border-radius: 5px; width: 22px; height: 22px; font-size: 13px; cursor: pointer; line-height: 1; }
  /* Today */
  .today-intro { background: linear-gradient(135deg, rgba(200,127,78,0.12), rgba(16,58,50,0.4)); border: 1px solid rgba(216,160,111,0.22); border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; font-size: 12px; color: var(--muted); line-height: 1.5; }
  .today-intro b { color: #f3ece2; }
  .match-card { background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); border: 1px solid var(--green-line); border-radius: 11px; padding: 12px 14px; margin-bottom: 8px; }
  .mc-time { font-size: 10px; color: var(--dim); margin-bottom: 7px; text-align: center; letter-spacing: 0.5px; }
  .mc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .mc-team { font-size: 13.5px; font-weight: 700; flex: 1; }
  .mc-right { text-align: right; }
  .mc-vs { font-size: 16px; font-weight: 900; color: var(--gold); padding: 0 8px; white-space: nowrap; }
  .mc-score { font-size: 16px; font-weight: 900; color: var(--copper-1); padding: 0 8px; white-space: nowrap; }
  .mc-probs { display: flex; align-items: flex-end; justify-content: center; gap: 16px; height: 64px; margin-bottom: 9px; }
  .mc-prob { display: flex; flex-direction: column; align-items: center; }
  .mcp-bar { width: 30px; height: 44px; background: rgba(255,255,255,0.05); border-radius: 5px; display: flex; align-items: flex-end; overflow: hidden; }
  .mcp-fill { width: 100%; border-radius: 5px 5px 0 0; transition: height 0.4s; }
  .mcp-fill.h { background: linear-gradient(180deg,var(--copper-1),var(--copper-3)); }
  .mcp-fill.d { background: linear-gradient(180deg,#7d9a86,#3f5a4a); }
  .mcp-fill.a { background: linear-gradient(180deg,#6aa,#388); }
  .mcp-lbl { font-size: 12px; font-weight: 800; color: var(--ink); margin-top: 4px; }
  .mcp-sub { font-size: 9.5px; color: var(--copper-soft); margin-top: 1px; text-align: center; max-width: 60px; }
  .mc-tag { font-size: 11.5px; color: var(--muted); background: rgba(255,255,255,0.03); border-radius: 6px; padding: 6px 9px; text-align: center; }
  .mc-tag.fav { color: var(--gold); }
  .mc-tag.done { color: var(--copper-1); }
  /* My Run */
  .picker-box { background: linear-gradient(135deg, rgba(200,127,78,0.12), rgba(16,58,50,0.4)); border: 1px solid rgba(216,160,111,0.3); border-radius: 14px; padding: 18px 16px; margin-bottom: 14px; text-align: center; }
  .picker-box .pk-title { font-size: 15px; font-weight: 800; color: #f3ece2; margin-bottom: 4px; }
  .picker-box .pk-sub { font-size: 11.5px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
  .pk-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
  .pk-name { background: rgba(255,255,255,0.05); border: 1px solid var(--green-line); border-radius: 9px; padding: 10px 6px; font-size: 12.5px; font-weight: 700; color: var(--ink); cursor: pointer; transition: all 0.15s; }
  .pk-name:active { transform: scale(0.96); }
  .pk-name:hover { border-color: var(--copper-soft); background: rgba(200,127,78,0.15); }
  .myrun-hero { background: linear-gradient(90deg, rgba(227,184,120,0.18), rgba(227,184,120,0.03)); border: 1px solid rgba(227,184,120,0.4); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
  .mh-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .mh-name { font-size: 22px; font-weight: 900; color: var(--gold); }
  .mh-change { font-size: 11px; color: var(--copper-soft); background: rgba(255,255,255,0.06); border: none; border-radius: 7px; padding: 5px 10px; cursor: pointer; font-weight: 700; }
  .mh-stats { display: flex; gap: 10px; margin-top: 12px; }
  .mh-stat { flex: 1; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; text-align: center; }
  .mh-stat .v { font-size: 21px; font-weight: 900; color: var(--copper-1); }
  .mh-stat .v.gold { color: var(--gold); }
  .mh-stat .l { font-size: 9.5px; color: var(--dim); margin-top: 2px; letter-spacing: 0.3px; }
  .gap-bar { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); border: 1px solid var(--green-line); border-radius: 9px; padding: 9px 13px; margin-bottom: 7px; font-size: 12px; }
  .gap-bar .gb-who { color: var(--muted); }
  .gap-bar .gb-who b { color: #d7ece0; }
  .gap-bar .gb-val { font-weight: 800; }

/* ============ SYNC ============ */
const DATA_URL = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";
const GROUP_ROUNDS = /^Matchday/i;  // group games use "Matchday N"; knockout uses "Round of 32" etc.
async function fetchScores(){
  if(syncing) return;
  syncing=true; syncError=null; setSyncBtn(true);
  try{
    const res=await fetch(DATA_URL+"?nc="+Date.now());
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json();
    const ng={},nm=[],nk=[];
    for(const m of (data.matches||[])){
      const home=norm(m.team1), away=norm(m.team2);
      const sc=m.score; let hg=null,ag=null;
      if(sc){ const arr=sc.et||sc.ft; if(Array.isArray(arr)&&arr.length===2){hg=arr[0];ag=arr[1];} }
      const played=hg!==null&&ag!==null;
      const round=m.round||"";
      const isGroup=GROUP_ROUNDS.test(round) || /^Group/i.test(m.group||"");
      const rec={home,away,hg:played?hg:"-",ag:played?ag:"-",date:m.date||"",time:m.time||"",played,
                 group:m.group||"",round};
      if(isGroup && /^Group/i.test(m.group||"")){
        nm.push(rec);
        if(played){
          if(home&&TEAM_POT[home]) ng[home]=(ng[home]||0)+hg;
          if(away&&TEAM_POT[away]) ng[away]=(ng[away]||0)+ag;
        }
      } else {
        // knockout match
        nk.push(rec);
        if(played){
          if(home&&TEAM_POT[home]) ng[home]=(ng[home]||0)+hg;
          if(away&&TEAM_POT[away]) ng[away]=(ng[away]||0)+ag;
        }
      }
    }
    goals=ng; matches=nm; knockout=nk; lastSync=new Date().toISOString(); save();
  }catch(e){ syncError=e.message; }
  syncing=false; setSyncBtn(false); render();
}
function setSyncBtn(loading){
  const btn=document.getElementById("syncBtn"); if(!btn) return;
  btn.disabled=loading; btn.innerHTML=loading?`<span class="spin">⟳</span> Syncing…`:`⟳ Refresh`;
}

/* ============ MATCH MODEL ============ */
function teamStrength(t){ return XGT_BASE[t]||3; }
function matchLambdas(home,away){
  const sH=teamStrength(home), sA=teamStrength(away);
  const base=1.32, ex=0.35;
  return [Math.max(0.2, base*Math.pow(sH/sA,ex)), Math.max(0.2, base*Math.pow(sA/sH,ex))];
}
function factN(n){ let r=1; for(let i=2;i<=n;i++) r*=i; return r; }
function pmf(k,l){ return Math.exp(-l)*Math.pow(l,k)/factN(k); }
function matchProbs(lH,lA){
  let pH=0,pD=0,pA=0;
  for(let i=0;i<=8;i++) for(let j=0;j<=8;j++){
    const p=pmf(i,lH)*pmf(j,lA);
    if(i>j) pH+=p; else if(i===j) pD+=p; else pA+=p;
  }
  const s=pH+pD+pA||1;
  return {pH:pH/s*100, pD:pD/s*100, pA:pA/s*100};
}

/* ============ GROUP TABLES ============ */
// Build standings per group from played group-stage matches.
function computeGroupTables(){
  const groups={};  // groupName -> { teamName -> stats }
  // Seed every team that appears in any group fixture (played or not).
  for(const m of matches){
    if(!/^Group/i.test(m.group)) continue;
    if(!groups[m.group]) groups[m.group]={};
    for(const t of [m.home,m.away]){
      if(t && !groups[m.group][t]) groups[m.group][t]={team:t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,h2h:{}};
    }
  }
  // Tally played matches.
  for(const m of matches){
    if(!/^Group/i.test(m.group) || !m.played) continue;
    const g=groups[m.group]; if(!g) continue;
    const H=g[m.home], A=g[m.away]; if(!H||!A) continue;
    const hg=+m.hg, ag=+m.ag;
    H.p++; A.p++; H.gf+=hg; H.ga+=ag; A.gf+=ag; A.ga+=hg;
    if(hg>ag){ H.w++; A.l++; H.pts+=3; H.h2h[m.away]=3; A.h2h[m.home]=0; }
    else if(hg<ag){ A.w++; H.l++; A.pts+=3; A.h2h[m.home]=3; H.h2h[m.away]=0; }
    else { H.d++; A.d++; H.pts++; A.pts++; H.h2h[m.away]=1; A.h2h[m.home]=1; }
  }
  // Sort each group: pts, then GD, then GF, then goals scored, then name.
  const out={};
  Object.keys(groups).sort().forEach(gName=>{
    const rows=Object.values(groups[gName]).map(r=>({...r,gd:r.gf-r.ga}));
    rows.sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.team.localeCompare(b.team));
    out[gName]=rows;
  });
  return out;
}
// FIFA 2026: 12 group winners + 12 runners-up + 8 best third-placed teams advance.
function getQualifiers(tables){
  const thirds=[];
  Object.keys(tables).forEach(g=>{
    const rows=tables[g];
    if(rows[2]) thirds.push({...rows[2],group:g,gd:rows[2].gf-rows[2].ga});
  });
  // Rank third-placed teams: pts, GD, GF.
  thirds.sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.team.localeCompare(b.team));
  const bestThirds=new Set(thirds.slice(0,8).map(t=>t.group+"|"+t.team));
  return {bestThirds, thirdsRanked:thirds};
}
function qualStatus(gName,rows,idx,bestThirds){
  if(idx===0) return "win";       // group winner
  if(idx===1) return "run";       // runner-up
  if(idx===2) return bestThirds.has(gName+"|"+rows[2].team) ? "third" : "out";
  return "out";
}

function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function shortName(t){ return t.length>10 ? t.slice(0,9)+"…" : t; }
// openfootball times look like "19:00 UTC-6" — parse offset and convert to Irish time.
function parseKO(m){
  if(!m.time || !m.date) return "";
  const mt=m.time.match(/(\d{1,2}):(\d{2})\s*UTC([+-]\d{1,2})/i);
  if(!mt) return "";
  const hh=+mt[1], mm=+mt[2], off=+mt[3];
  // Build a UTC instant: local clock minus offset.
  const utcH = hh - off;
  const dt = new Date(m.date+"T00:00:00Z");
  dt.setUTCHours(utcH, mm, 0, 0);
  return dt.toISOString();
}
function fmtIrish(iso){
  if(!iso) return "";
  const dt=new Date(iso);
  if(isNaN(dt.getTime())) return "";
  try{ return dt.toLocaleTimeString('en-GB',{timeZone:'Europe/Dublin',hour:'2-digit',minute:'2-digit',hour12:false}); }
  catch(e){ return ""; }
}
function fmtIrishDate(iso){
  if(!iso) return "";
  const dt=new Date(iso);
  if(isNaN(dt.getTime())) return "";
  try{ return dt.toLocaleDateString('en-GB',{timeZone:'Europe/Dublin',day:'2-digit',month:'short'}); }
  catch(e){ return ""; }
}

    const iso=parseKO(m);
    const irish=fmtIrish(iso);
    const timeLine = irish ? `<div class="mc-time">⏰ ${irish} · Irish time${m.group?(' · '+m.group):''}</div>` : (m.group?`<div class="mc-time">${m.group}</div>`:"");
    if(m.played){
      html+=`<div class="match-card">${timeLine}
        <div class="mc-head"><span class="mc-team">${FLAGS[H]||""} ${H}</span>
          <span class="mc-score">${m.hg} – ${m.ag}</span>
          <span class="mc-team mc-right">${A} ${FLAGS[A]||""}</span></div>
        <div class="mc-tag done">✅ Full time</div></div>`;
      return;
    }
    const [lH,lA]=matchLambdas(H,A);
    const pr=matchProbs(lH,lA);
    const eH=Math.round(lH), eA=Math.round(lA);
    let verdict;
    if(Math.abs(pr.pH-pr.pA)<8) verdict=`⚖️ Tight — could go either way`;
    else if(pr.pH>pr.pA) verdict=`⭐ ${H} favoured`;
    else verdict=`⭐ ${A} favoured`;
    html+=`<div class="match-card">${timeLine}
      <div class="mc-head">
        <span class="mc-team">${FLAGS[H]||""} ${H}</span>
        <span class="mc-vs">${eH} – ${eA}</span>
        <span class="mc-team mc-right">${A} ${FLAGS[A]||""}</span>
      </div>
      <div class="mc-probs">
        <div class="mc-prob"><div class="mcp-bar"><div class="mcp-fill h" style="height:${pr.pH}%"></div></div><div class="mcp-lbl">${Math.round(pr.pH)}%</div><div class="mcp-sub">${shortName(H)}</div></div>
        <div class="mc-prob"><div class="mcp-bar"><div class="mcp-fill d" style="height:${pr.pD}%"></div></div><div class="mcp-lbl">${Math.round(pr.pD)}%</div><div class="mcp-sub">Draw</div></div>
        <div class="mc-prob"><div class="mcp-bar"><div class="mcp-fill a" style="height:${pr.pA}%"></div></div><div class="mcp-lbl">${Math.round(pr.pA)}%</div><div class="mcp-sub">${shortName(A)}</div></div>
      </div>
      <div class="mc-tag fav">${verdict} · predicted ${eH}–${eA}</div>
    </div>`;
  });
  html+=`<div class="note">📊 Predictions only, not guarantees. Bars are win / draw / win; the centre number is the most likely scoreline.</div>`;
  return html;
}

/* ============ BRACKET VIEW ============ */
const ROUND_ORDER = ["Round of 32","Round of 16","Quarter-final","Quarter-finals","Semi-final","Semi-finals","Third place","Match for third place","Final"];
function roundRank(r){
  const i=ROUND_ORDER.findIndex(x=>x.toLowerCase()===(r||"").toLowerCase());
  return i<0?99:i;
}
// Pretty short label for a round (handles singular/plural variants).
function roundShort(r){
  const x=(r||"").toLowerCase();
  if(x.includes("round of 32")) return "Round of 32";
  if(x.includes("round of 16")) return "Round of 16";
  if(x.includes("quarter")) return "Quarter-finals";
  if(x.includes("semi")) return "Semi-finals";
  if(x.includes("third")||x.includes("match for third")) return "3rd place";
  if(x.includes("final")) return "Final";
  return r||"Knockout";
}
// Winner of a played tie (score as in feed: FT/ET).
function tieWinner(m){
  if(!m||!m.played) return null;
  const hg=+m.hg, ag=+m.ag;
  if(hg>ag) return m.home;
  if(ag>hg) return m.away;
  return null;
}
// PORTRAIT card (existing .tie structure, used in the vertical fallback list).
function tieCardHTML(m){
  const iso=parseKO(m);
  const dStr = iso ? fmtIrishDate(iso) : (m.date? m.date.slice(5):"");
  const tStr = iso ? fmtIrish(iso) : "";
  const metaInner = dStr ? `<div class="tie-date">${dStr.replace(' ','<br>')}${tStr?('<br>'+tStr):''}</div>` : `<div class="tie-date">TBD</div>`;
  let hCls="",aCls="",tieCls="";
  if(m.played){
    tieCls=" t-done";
    const hg=+m.hg, ag=+m.ag;
    if(hg>ag){ hCls="win"; aCls="lose"; }
    else if(ag>hg){ aCls="win"; hCls="lose"; }
  } else if(m.home && m.away){ tieCls=" t-live"; }
  const nameCell=(t)=> t
    ? `<span class="tt-name"><span class="tt-flag">${FLAGS[t]||""}</span>${t}</span>`
    : `<span class="tt-name tbd">To be decided</span>`;
  const hScore=m.played?`<span class="tt-score">${m.hg}</span>`:"";
  const aScore=m.played?`<span class="tt-score">${m.ag}</span>`:"";
  return `<div class="tie${tieCls}">
    <div class="tie-meta">${metaInner}</div>
    <div class="tie-teams">
      <div class="tie-team ${hCls}">${nameCell(m.home)}${hScore}</div>
      <div class="tie-team ${aCls}">${nameCell(m.away)}${aScore}</div>
    </div>
  </div>`;
}
// LANDSCAPE compact match slot for the horizontal grid.
// One match rendered SofaScore-style: two stacked flag circles + scores.
function slotHTML(m, pairCls, styleAttr){
  let hCls="",aCls="";
  if(m && m.played){
    const hg=+m.hg, ag=+m.ag;
    if(hg>ag){ hCls="win"; aCls="lose"; }
    else if(ag>hg){ aCls="win"; hCls="lose"; }
  }
  const cell=(t,cls,score)=>{
    const flag = t
      ? `<span class="bflagc" title="${t}">${FLAGS[t]||"🏳️"}</span>`
      : `<span class="bflagc tbd"></span>`;
    const sc = (score!==null&&score!==undefined) ? `<span class="bscore">${score}</span>` : `<span class="bscore"></span>`;
    return `<div class="bcell ${cls}">${flag}${sc}</div>`;
  };
  const hs=(m&&m.played)?m.hg:null, as=(m&&m.played)?m.ag:null;
  return `<div class="bslot ${pairCls||""}"${styleAttr||""}>
    <div class="bmatch">
      ${cell(m?m.home:null,hCls,hs)}
      ${cell(m?m.away:null,aCls,as)}
    </div>
  </div>`;
}

function bracketHTML(){
  let html=`<div class="bracket-intro">🏆 <b>Knockout bracket.</b> Round of 32 down to the Final. Scores are full-time (incl. extra time) straight from the feed.</div>`;

  // Tip to rotate (portrait only — hidden in landscape via CSS).
  html+=`<div class="rotate-hint">
    <span class="rh-icon">📱</span>
    <span class="rh-txt"><b>Turn your phone sideways</b> to see the full bracket — both sides converging toward the Final in the centre. Upright, it shows as a round-by-round list.</span>
  </div>`;

  // Build rounds in tournament order (from live data, or skeleton if empty).
  let rounds, byRound={}, isSkeleton=false;
  if(knockout.length){
    knockout.forEach(m=>{ const r=m.round||"Knockout"; (byRound[r]=byRound[r]||[]).push(m); });
    rounds=Object.keys(byRound).sort((a,b)=>roundRank(a)-roundRank(b));
  } else {
    isSkeleton=true;
    // Skeleton: empty matches so the shape is visible before fixtures publish.
    const plan=[["Round of 32",16],["Round of 16",8],["Quarter-finals",4],["Semi-finals",2],["Final",1]];
    rounds=plan.map(p=>p[0]);
    plan.forEach(([name,n])=>{ byRound[name]=Array.from({length:n},()=>({round:name,home:null,away:null,played:false})); });
  }

  /* ---- PORTRAIT: vertical round-by-round list (existing .tie cards) ---- */
  let vert=`<div class="bracket-vertical">`;
  if(isSkeleton){
    vert+=`<div style="color:var(--dim);font-size:12.5px;text-align:center;padding:6px 10px 12px;line-height:1.6">
      🔒 Knockout stage not started yet.<br>
      <span style="font-size:11px">Round of 32 begins 28 June — ties appear here once published.</span></div>`;
  }
  rounds.forEach(rName=>{
    const ties=byRound[rName].slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    const done=ties.filter(m=>m.played).length;
    const prog = isSkeleton ? "" : (done===ties.length?`${ties.length} played`:`${done}/${ties.length} played`);
    vert+=`<div class="rnd-label">${roundShort(rName)}${prog?`<span style="flex:0;color:var(--dim);font-size:9px;font-weight:700;letter-spacing:0.5px;margin-left:auto;text-transform:none">${prog}</span>`:""}</div>`;
    // In skeleton mode, only show a couple of placeholder ties per round to keep the list short.
    (isSkeleton ? ties.slice(0, rName==="Round of 32"?3:1) : ties).forEach(m=>{ vert+=tieCardHTML(m); });
  });
  vert+=`</div>`;

  /* ---- LANDSCAPE: SofaScore-style symmetric bracket ---- */
  const S=56, G0=12;   // slot height + base gap (must match CSS defaults)
  // Pre-final rounds (R32..SF) in order; Final + 3rd place handled in the centre.
  const preFinal = rounds.filter(r=>!/^final$/i.test(r) && !/third|3rd|match for third/i.test(r));
  const thirdRound = rounds.find(r=>/third|3rd|match for third/i.test(r));
  const finalRound = rounds.find(r=>/^final$/i.test(r));

  // Compute centres for the LEFT half (right half mirrors the same numbers).
  // Each pre-final round contributes half its matches to a side.
  function halfCounts(){ return preFinal.map(r=>Math.max(1, Math.ceil(byRound[r].length/2))); }
  function centresForCounts(counts){
    const c=[];
    counts.forEach((n,ci)=>{
      if(ci===0){ const a=[]; for(let i=0;i<n;i++) a.push(S/2+i*(S+G0)); c.push(a); }
      else { const p=c[ci-1], a=[]; for(let j=0;j<n;j++){ const x=p[2*j],y=p[2*j+1]; a.push((x!==undefined&&y!==undefined)?(x+y)/2:(x!==undefined?x:(y||S/2))); } c.push(a); }
    });
    return c;
  }
  const counts=halfCounts();
  const centres=centresForCounts(counts);

  // Render one half. side='left' or 'right'. Matches for each round are split:
  // left takes the first half (in feed order), right takes the second half.
  function renderHalf(side){
    let h=`<div class="bk-half ${side}">`;
    preFinal.forEach((rName,ci)=>{
      const all=byRound[rName];               // feed order = bracket position
      const half=Math.ceil(all.length/2);
      const slice = side==='left' ? all.slice(0,half) : all.slice(half);
      const hasNext = ci<preFinal.length-1;
      const hasFeed = ci>0;
      const c=centres[ci];
      const gapK = c.length>1 ? (c[1]-c[0]-S) : G0;
      const topMargin = Math.max(0, c[0]-S/2);
      h+=`<div class="bcol ${hasNext?'has-next':''} ${hasFeed?'has-feed':''}">
        <div class="bcol-head">${roundShort(rName)}</div><div class="bcol-body">`;
      slice.forEach((m,si)=>{
        const pairCls = hasNext ? (si%2===0?'pair-top':'pair-bot') : '';
        const style=` style="--slot:${S}px;--gap:${gapK}px;margin-top:${si===0?topMargin:0}px"`;
        h+=slotHTML(m, pairCls, style);
      });
      h+=`</div></div>`;
    });
    return h+`</div>`;
  }

  // Centre column: Final pair + champion + 3rd place.
  const finalMatch = finalRound ? byRound[finalRound][0] : null;
  const champ = finalMatch ? tieWinner(finalMatch) : null;
  function pairCells(m){
    let hC="",aC="";
    if(m&&m.played){ const hg=+m.hg,ag=+m.ag; if(hg>ag){hC="win";aC="lose";} else if(ag>hg){aC="win";hC="lose";} }
    const cell=(t,cls,sc)=>{
      const fl = t?`<span class="bflagc" title="${t}">${FLAGS[t]||"🏳️"}</span>`:`<span class="bflagc tbd"></span>`;
      const s=(sc!==null&&sc!==undefined)?`<span class="bscore">${sc}</span>`:"";
      return `<div class="bcell ${cls}" style="flex-direction:column;gap:3px">${fl}${s}</div>`;
    };
    return cell(m?m.home:null,hC,(m&&m.played)?m.hg:null)+cell(m?m.away:null,aC,(m&&m.played)?m.ag:null);
  }
  const thirdMatch = thirdRound ? byRound[thirdRound][0] : null;
  let centre=`<div class="bk-centre">
    <div class="bk-final">
      <div class="bf-lbl">Final</div>
      <div class="bf-pair">${pairCells(finalMatch)}</div>
    </div>
    <div class="bk-champ">
      <div class="bc-crown">🏆</div>
      ${champ ? `<div class="bc-name">${FLAGS[champ]||""} ${champ}</div>` : `<div class="bc-await">Awaiting final</div>`}
    </div>`;
  if(thirdRound){
    centre+=`<div class="bk-third"><div class="b3-lbl">3rd place</div><div class="b3-pair">${pairCells(thirdMatch)}</div></div>`;
  }
  centre+=`</div>`;

  let grid=`<div class="bracket-grid"><div class="bk-wrap">${renderHalf('left')}${centre}${renderHalf('right')}</div></div>`;

  return html+vert+grid;
}

/* ============ MY RUN ============ */
// Is a team eliminated? (3 group games played and no upcoming match anywhere)
function teamPlayed(team){ return matches.concat(knockout).filter(m=>m.played&&(m.home===team||m.away===team)).length; }
function teamHasUpcoming(team){ return matches.concat(knockout).some(m=>!m.played&&(m.home===team||m.away===team)); }
function teamEliminated(team){ return teamPlayed(team)>=3 && !teamHasUpcoming(team); }
// Next scheduled match for a team (earliest unplayed), across group + knockout.
function nextMatchFor(team){
  const up=matches.concat(knockout).filter(m=>!m.played&&(m.home===team||m.away===team));
  up.sort((a,b)=>(parseKO(a)||a.date||"9").localeCompare(parseKO(b)||b.date||"9"));
  return up[0]||null;
}
function renderMyRun(){
  const el=document.getElementById("tab-myrun");
  let html=syncBarHTML();
  // If no participant chosen yet → show picker.
  if(!myName || !PARTICIPANTS.some(p=>p.name===myName)){
    html+=`<div class="picker-box">
      <div class="pk-title">👤 Who are you?</div>
      <div class="pk-sub">Pick your name to see your personal dashboard — your teams, your points, your upcoming matches and where you stand.</div>
      <div class="pk-grid">`;
    PARTICIPANTS.map(p=>p.name).sort((a,b)=>a.localeCompare(b)).forEach(n=>{
      html+=`<button class="pk-name" onclick="pickMe('${n.replace(/'/g,"\\'")}')">${n}</button>`;
    });
    html+=`</div></div>`;
    el.innerHTML=html; setSyncBtn(syncing); return;
  }
  const me=PARTICIPANTS.find(p=>p.name===myName);
  const lb=getLeaderboard();
  const ranks=computeRanks(lb);
  const myRank=ranks[myName];
  const myPts=calcPts(me);
  const sorted=[...lb];
  const myIdx=sorted.findIndex(p=>p.name===myName);
  const above=myIdx>0?sorted[myIdx-1]:null;
  const below=myIdx<sorted.length-1?sorted[myIdx+1]:null;

  // Potential: how many of my teams are still alive × their multiplier (rough ceiling indicator).
  const teams=[me.p1,me.p2,me.p3,me.p4];
  const aliveCount=teams.filter(t=>!teamEliminated(t)).length;

  html+=`<div class="myrun-hero">
    <div class="mh-top"><span class="mh-name">${myName}</span>
      <button class="mh-change" onclick="changeMe()">↺ Switch</button></div>
    <div class="mh-stats">
      <div class="mh-stat"><div class="v gold">#${myRank}</div><div class="l">RANK / ${PARTICIPANTS.length}</div></div>
      <div class="mh-stat"><div class="v">${myPts}</div><div class="l">POINTS</div></div>
      <div class="mh-stat"><div class="v">${aliveCount}/4</div><div class="l">TEAMS ALIVE</div></div>
    </div></div>`;

  // Gap to neighbours.
  if(above){
    const d=above.pts-myPts;
    html+=`<div class="gap-bar"><span class="gb-who">⬆️ To catch <b>${above.name}</b></span>
      <span class="gb-val behind">${d===0?'level':'+'+d+' pts'}</span></div>`;
  } else {
    html+=`<div class="gap-bar"><span class="gb-who">👑 You're top of the table</span><span class="gb-val ahead">leader</span></div>`;
  }
  if(below){
    const d=myPts-below.pts;
    html+=`<div class="gap-bar"><span class="gb-who">⬇️ Lead over <b>${below.name}</b></span>
      <span class="gb-val ahead">${d===0?'level':'+'+d+' pts'}</span></div>`;
  }

  // My teams.
  html+=`<div class="section-title" style="margin-top:16px">⚽ My teams</div>`;
  [["1",me.p1,1],["2",me.p2,2],["3",me.p3,3],["4",me.p4,4]].forEach(([lbl,team,pot])=>{
    const g=goals[team]||0, pts=g*POT_PTS[pot];
    const elim=teamEliminated(team);
    const nm=nextMatchFor(team);
    let status,scls;
    if(elim){ status=`Eliminated · ${g} ⚽ final`; scls="elim"; }
    else if(nm){
      const opp=nm.home===team?nm.away:nm.home;
      const iso=parseKO(nm); const t=fmtIrish(iso); const d=fmtIrishDate(iso);
      status=`Next: vs ${opp}${d?(' · '+d):''}${t?(' '+t):''}`; scls="upcoming";
    } else { status=`${g} ⚽ so far`; scls="live"; }
    html+=`<div class="myteam ${elim?'elim':''}">
      <div class="mt-pot"><div class="pn">POT</div><div class="pm">${lbl}</div></div>
      <div class="mt-main"><div class="mt-team">${FLAGS[team]||""} ${team}</div>
        <div class="mt-status ${scls}">${status}</div></div>
      <div class="mt-pts"><div class="p">${pts}</div><div class="gl">${g}⚽ ×${POT_PTS[pot]}</div></div>
    </div>`;
  });
  // Tiebreaker pick.
  html+=`<div class="mt-tb"><span>🏆 Winner pick (tiebreaker)</span><b>${FLAGS[me.tb]||""} ${me.tb}</b></div>`;

  // My upcoming fixtures (next 5 across all my teams).
  const myUpcoming=[];
  teams.forEach(team=>{
    matches.concat(knockout).filter(m=>!m.played&&(m.home===team||m.away===team)).forEach(m=>{
      myUpcoming.push({m,team});
    });
  });
  // De-dup (a match could involve two of my teams) and sort by time.
  const seen=new Set(); const uniq=[];
  myUpcoming.sort((a,b)=>(parseKO(a.m)||a.m.date||"9").localeCompare(parseKO(b.m)||b.m.date||"9"));
  myUpcoming.forEach(({m,team})=>{
    const key=m.home+"|"+m.away+"|"+m.date;
    if(seen.has(key)) return; seen.add(key); uniq.push({m,team});
  });
  if(uniq.length){
    html+=`<div class="section-title" style="margin-top:16px">📅 Your next matches</div>`;
    uniq.slice(0,6).forEach(({m,team})=>{
      const mine=t=>teams.includes(t)?`<b>${FLAGS[t]||""} ${t}</b>`:`${FLAGS[t]||""} ${t}`;
      const iso=parseKO(m); const tm=fmtIrish(iso); const d=fmtIrishDate(iso);
      const when = (d||tm) ? `${d||""}${tm?(' · '+tm):''}` : (m.round||m.group||"TBD");
      html+=`<div class="myfix"><span class="mf-team">${mine(m.home)} <span style="color:var(--dim)">v</span> ${mine(m.away)}</span>
        <span class="mf-when">${when}${tm?'<br><span style="color:var(--dim)">Irish</span>':''}</span></div>`;
    });
  }
  html+=`<div class="note">💡 This dashboard is just for you (saved on this device). Tap “Switch” to view as someone else.</div>`;
  el.innerHTML=html; setSyncBtn(syncing);
}
function pickMe(n){ myName=n; save(); renderMyRun(); }
function changeMe(){ myName=null; save(); renderMyRun(); }

  let html=`<div class="prize-hero">
    <div class="ph-trophy">🏆</div>
    <div class="ph-title">World Cup <span class="gold-word">Gold Rush</span><br>Prize List</div>
    <div class="ph-sub">Gallagher · 2026</div>
  </div>`;

  // Live: who currently holds each prize position (from the leaderboard).
  const lb=getLeaderboard();
  const ranks=computeRanks(lb);

  PRIZES.forEach((pz,i)=>{
    // Find who currently sits in this place (rank i+1), if anyone.
    const holders=lb.filter(p=>ranks[p.name]===(i+1)).map(p=>p.name);
    const holderLine = holders.length
      ? `<div style="font-size:10.5px;color:var(--copper-soft);margin-top:4px">📍 Currently: ${holders.join(", ")}</div>`
      : "";
    html+=`<div class="prize-card ${pz.cls}">
      <div class="pc-medal"><div class="pm-icon">${pz.icon}</div><div class="pm-place">${(i+1)}${["ST","ND","RD","TH","TH"][i]}</div></div>
      <div class="pc-body">
        <div class="pc-rank">${pz.place} · <span style="color:${pz.cls==='grand'?'var(--gold)':'var(--copper-1)'}">${pz.cash}</span></div>
        <div class="pc-reward">${pz.reward}</div>
        ${holderLine}
      </div>
      <div class="pc-cash-big">${pz.big}</div>
    </div>`;
  });

  html+=`<div class="prize-divider"><span>And spare a thought for…</span></div>`;
  // Last place holder.
  const lastHolder = lb.length ? lb[lb.length-1] : null;
  const lastRank = lastHolder ? ranks[lastHolder.name] : null;
  const lastHolders = lastHolder ? lb.filter(p=>ranks[p.name]===lastRank).map(p=>p.name) : [];
  const lastLine = lastHolders.length
    ? `<div style="font-size:10.5px;color:var(--dim);margin-top:4px">📍 Currently: ${lastHolders.join(", ")}</div>`
    : "";
  html+=`<div class="prize-card ${LAST_PRIZE.cls}">
    <div class="pc-medal"><div class="pm-icon">${LAST_PRIZE.icon}</div><div class="pm-place">LAST</div></div>
    <div class="pc-body">
      <div class="pc-rank">${LAST_PRIZE.place} · <span style="color:var(--copper-1)">${LAST_PRIZE.cash}</span></div>
      <div class="pc-reward">${LAST_PRIZE.reward}</div>
      ${lastLine}
    </div>
    <div class="pc-cash-big">${LAST_PRIZE.big}</div>
  </div>`;

  html+=`<div class="note" style="margin-top:16px">🎉 Prizes awarded at the end of the tournament based on final standings. “Currently” shows who'd win if the pool ended right now — plenty can still change!</div>`;
  el.innerHTML=html;
}

/* ============ PREDICTOR ============ */
const N_SIMS = 10000;
const PRIOR_K = 4;
let xgtOverrides = {};
let showStrength = false;
let lastCalib = null;

function mPlayed(team){ return matches.concat(knockout).filter(m=>m.played&&(m.home===team||m.away===team)).length; }
function hasMore(team){ return matches.concat(knockout).some(m=>!m.played&&(m.home===team||m.away===team)); }
function qualifyProb(team){ const s=XGT_BASE[team]||3; return Math.min(0.93, Math.max(0.20, 0.25 + (s-2)/11*0.67)); }
function koWinProb(team){   const s=XGT_BASE[team]||3; return Math.min(0.65, Math.max(0.30, 0.30 + (s-2)/11*0.32)); }
function expBaseMatches(team){ const q=qualifyProb(team), w=koWinProb(team); return 3 + q*(1-Math.pow(w,5))/(1-w); }
function expRemainingMatches(team){
  const played=mPlayed(team);
  if(played>=3 && !hasMore(team)) return 0;
  const q=qualifyProb(team), w=koWinProb(team);
  if(played<3) return (3-played) + q*(1-Math.pow(w,5))/(1-w);
  const r=Math.max(8-played,0);
  return (1-Math.pow(w,r))/(1-w);
}
function getDyn(team){
  if(xgtOverrides[team]!==undefined) return xgtOverrides[team];
  const scored=goals[team]||0;
  const played=mPlayed(team);
  if(played>=3 && !hasMore(team)) return scored;
  const priorRate=(XGT_BASE[team]||3)/expBaseMatches(team);
  const lambda=(PRIOR_K*priorRate + scored)/(PRIOR_K + played);
  return scored + lambda*expRemainingMatches(team);
}
function goalsHash(){ let h=20260616; for(const[t,g]of Object.entries(goals)){ h=(h+ t.length*131*(g+1))>>>0; } return h>>>0; }
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296; }; }
function poisson(lam,rng){ if(lam<=0) return 0; const L=Math.exp(-lam);let k=0,p=1;do{k++;p*=rng();}while(p>L);return k-1; }

function runSim(){
  lastCalib=new Date();
  const teams=Object.keys(TEAM_POT);
  const dyn={}; teams.forEach(t=>dyn[t]=getDyn(t));
  const rng=mulberry32(goalsHash());
  const winCount={},ptsSum={};
  PARTICIPANTS.forEach(p=>{winCount[p.name]=0;ptsSum[p.name]=0;});
  for(let s=0;s<N_SIMS;s++){
    const fg={};
    for(const t of teams){ const cur=goals[t]||0; fg[t]=cur+poisson(Math.max(dyn[t]-cur,0),rng); }
    let maxP=-1;const sc={};
    for(const p of PARTICIPANTS){
      const pts=fg[p.p1]*POT_PTS[TEAM_POT[p.p1]]+fg[p.p2]*POT_PTS[TEAM_POT[p.p2]]+fg[p.p3]*POT_PTS[TEAM_POT[p.p3]]+fg[p.p4]*POT_PTS[TEAM_POT[p.p4]];
      sc[p.name]=pts;ptsSum[p.name]+=pts;if(pts>maxP)maxP=pts;
    }
    const winners=PARTICIPANTS.filter(p=>sc[p.name]===maxP);
    const share=1/winners.length;
    winners.forEach(w=>{winCount[w.name]+=share;});
  }
  return PARTICIPANTS.map(p=>({name:p.name,winPct:winCount[p.name]/N_SIMS*100,expPts:ptsSum[p.name]/N_SIMS}))
    .sort((a,b)=>b.winPct-a.winPct||b.expPts-a.expPts);
}
function topTeamsByStrength(){
  return Object.keys(TEAM_POT).filter(t=>!(mPlayed(t)>=3&&!hasMore(t))).sort((a,b)=>getDyn(b)-getDyn(a)).slice(0,3);
}
function makeVerdict(res){
  const a=res[0],b=res[1],c=res[2];
  const gap=a.winPct-b.winPct;
  let line;
  if(a.winPct<3) line=`📣 Still wide open — no runaway favourite yet. <b>${a.name}</b> just shades it on ${a.winPct.toFixed(1)}%.`;
  else if(gap>=5) line=`📣 <b>${a.name}</b> is the standout favourite to win the pool at ${a.winPct.toFixed(1)}%, clear of the chasing pack.`;
  else if(gap>=2) line=`📣 <b>${a.name}</b> leads the pool on ${a.winPct.toFixed(1)}%, with <b>${b.name}</b> breathing down their neck.`;
  else line=`📣 Too close to call: <b>${a.name}</b>, <b>${b.name}</b> and <b>${c.name}</b> are all in the fight.`;
  const tt=topTeamsByStrength().map(t=>`${FLAGS[t]||""} ${t}`).join(", ");
  return line+`<br><span style="color:var(--muted);font-size:12px">Form + odds favour these nations right now: ${tt}.</span>`;
}
function fmtCalib(){ return lastCalib?("Updated "+lastCalib.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})):"—"; }
function renderPredictor(){
  try{
    const results=runSim();
    const maxWin=Math.max(...results.map(r=>r.winPct),1);
    const top=results[0];
    let html=syncBarHTML();
    html+=`<div class="pred-intro">📊 <b>Who's winning the pool?</b><br>
      Our call, built from the bookmakers' odds on every nation plus how the teams are actually playing. It refreshes on its own after each match.</div>`;
    html+=`<div class="pred-verdict">${makeVerdict(results)}</div>`;
    html+=`<div class="calib-bar"><div class="calib-status">⚡ ${fmtCalib()} · auto-refresh on</div>
      <button class="btn-recalib" onclick="renderPredictor()">↺ Refresh now</button></div>`;
    html+=`<div class="pred-top"><div class="pred-top-lbl">Favourite to win the pool</div>
      <div class="pred-top-name">${top.name}</div>
      <div class="pred-top-sub">${top.winPct.toFixed(1)}% chance · ~${Math.round(top.expPts)} projected pts</div></div>`;
    results.forEach((r,i)=>{
      const w=Math.max(r.winPct/maxWin*100,r.winPct>0?2:0);
      const fillBg=i===0?"linear-gradient(90deg,#e3b878,#c87f4e)":"linear-gradient(90deg,#a35f33,#d9a06f)";
      html+=`<div class="pred-row-card"><div class="pred-row-head">
        <span class="pred-rank">#${i+1}</span><span class="pred-name">${r.name}</span>
        <span class="pred-pct" style="color:${i===0?'#e3b878':'#d9a06f'}">${r.winPct<0.1?'&lt;0.1':r.winPct.toFixed(1)}%</span>
        <span class="pred-exp">~${Math.round(r.expPts)}pts</span></div>
        <div class="pred-bar"><div class="pred-fill" style="width:${w}%;background:${fillBg}"></div></div></div>`;
    });
    html+=`<button class="pred-toggle" onclick="toggleStrength()">${showStrength?'▲ Hide team ratings':'▼ View / tweak team ratings'}</button>`;
    if(showStrength){
      html+=`<div class="str-help">Our current rating for each nation (their expected goals). <b style="color:#6fcf97">AUTO</b> updates from real form · <b style="color:#e3b878">MANUAL</b> is your tweak (↺ to revert). Eliminated teams locked.</div>`;
      [1,2,3,4].forEach(pot=>{
        html+=`<div class="pot-label">POT ${pot} · ${POT_PTS[pot]}pts/goal</div>`;
        Object.keys(TEAM_POT).sort().filter(t=>TEAM_POT[t]===pot).forEach(t=>{
          const played=mPlayed(t);
          const elim=played>=3&&!hasMore(t);
          const isManual=xgtOverrides[t]!==undefined;
          const dynVal=getDyn(t);
          if(elim){
            html+=`<div class="str-row elim"><span>${FLAGS[t]||""} ${t}<span class="tag-elim">OUT</span></span>
              <span style="color:var(--dim);font-size:12px">${goals[t]||0} ⚽ final</span></div>`;
          } else {
            const tag=isManual?'<span class="tag-manual">MANUAL</span>':'<span class="tag-auto">AUTO</span>';
            const resetBtn=isManual?`<button class="btn-reset" title="Reset to auto" onclick="resetXgt('${t}')">↺</button>`:'';
            html+=`<div class="str-row active"><span>${FLAGS[t]||""} ${t}${tag}<span class="meta-mini">${played}p</span></span>
              <div class="str-ctrl">
                <button class="btn-minus" onclick="adjXgt('${t}',-0.5)">−</button>
                <span class="str-val">${dynVal.toFixed(1)}</span>
                <button class="btn-plus" onclick="adjXgt('${t}',0.5)">+</button>
                ${resetBtn}
              </div></div>`;
          }
        });
      });
    }
    html+=`<div class="note">⚠️ A prediction, not a guarantee. Refreshes automatically after every match (and hourly).</div>`;
    document.getElementById("tab-predictor").innerHTML=html;
    setSyncBtn(syncing);
  }catch(err){
    document.getElementById("tab-predictor").innerHTML='<div class="note" style="background:#3a1010;border-color:#822;color:#ff8080">⚠️ Predictor error: '+(err&&err.message?err.message:err)+'</div>';
  }
}
function toggleStrength(){ showStrength=!showStrength; renderPredictor(); }
function adjXgt(team,delta){ const cur=getDyn(team); xgtOverrides[team]=Math.max(0,Math.round((cur+delta)*2)/2); renderPredictor(); }
function resetXgt(team){ delete xgtOverrides[team]; renderPredictor(); }

/* ============ INIT + TIMERS ============ */
try{ podiumReveal=true; render(); }catch(err){
  var el=document.getElementById("tab-leaderboard");
  if(el) el.innerHTML='<div class="note" style="background:#3a1010;border-color:#822;color:#ff8080">⚠️ '+(err&&err.message?err.message:err)+'</div>';
}
fetchScores();
setInterval(fetchScores, 3*60*1000);
setInterval(()=>{ if(activeTab==='predictor') renderPredictor(); else if(activeTab==='today') renderTodayTab(); }, 60*60*1000);
</script>
