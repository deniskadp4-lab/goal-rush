<style>

  .pred-row-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }

  .str-help { font-size: 11px; color: var(--copper-soft); margin: 10px 0; line-height: 1.5; }

/* ============ SYNC ============ */
const DATA_URL = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";
async function fetchScores(){
  if(syncing) return;
  syncing=true; syncError=null; setSyncBtn(true);
  try{
    const res=await fetch(DATA_URL+"?nc="+Date.now());
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json();
    const ng={},nm=[];
    for(const m of (data.matches||[])){
      const home=norm(m.team1), away=norm(m.team2);
      const sc=m.score; let hg=null,ag=null;
      if(sc){ const arr=sc.et||sc.ft; if(Array.isArray(arr)&&arr.length===2){hg=arr[0];ag=arr[1];} }
      const played=hg!==null&&ag!==null;
      nm.push({home,away,hg:played?hg:"-",ag:played?ag:"-",date:m.date||"",time:m.time||"",played});
      if(played){
        if(home&&TEAM_POT[home]) ng[home]=(ng[home]||0)+hg;
        if(away&&TEAM_POT[away]) ng[away]=(ng[away]||0)+ag;
      }
    }
    goals=ng; matches=nm; lastSync=new Date().toISOString(); save();
  }catch(e){ syncError=e.message; }
  syncing=false; setSyncBtn(false); render();
}
function setSyncBtn(loading){
  const btn=document.getElementById("syncBtn"); if(!btn) return;
  btn.disabled=loading; btn.innerHTML=loading?`<span class="spin">⟳</span> Syncing…`:`⟳ Refresh`;
}

/* ============ MATCH MODEL ============ */
function teamStrength(t){ return XGT_BASE[t]||3; }
function matchLambdas(home,away){
  const sH=teamStrength(home), sA=teamStrength(away);
  const base=1.32, ex=0.35;
  return [Math.max(0.2, base*Math.pow(sH/sA,ex)), Math.max(0.2, base*Math.pow(sA/sH,ex))];
}
function factN(n){ let r=1; for(let i=2;i<=n;i++) r*=i; return r; }
function pmf(k,l){ return Math.exp(-l)*Math.pow(l,k)/factN(k); }
function matchProbs(lH,lA){
  let pH=0,pD=0,pA=0;
  for(let i=0;i<=8;i++) for(let j=0;j<=8;j++){
    const p=pmf(i,lH)*pmf(j,lA);
    if(i>j) pH+=p; else if(i===j) pD+=p; else pA+=p;
  }
  const s=pH+pD+pA||1;
  return {pH:pH/s*100, pD:pD/s*100, pA:pA/s*100};
}

function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

  if(!timeStr) return "";

/* ============ PREDICTOR ============ */
const N_SIMS = 10000;
const PRIOR_K = 4;
let xgtOverrides = {};
let showStrength = false;
let lastCalib = null;

function mPlayed(team){ return matches.filter(m=>m.played&&(m.home===team||m.away===team)).length; }
function hasMore(team){ return matches.some(m=>!m.played&&(m.home===team||m.away===team)); }
function qualifyProb(team){ const s=XGT_BASE[team]||3; return Math.min(0.93, Math.max(0.20, 0.25 + (s-2)/11*0.67)); }
function koWinProb(team){   const s=XGT_BASE[team]||3; return Math.min(0.65, Math.max(0.30, 0.30 + (s-2)/11*0.32)); }
function expBaseMatches(team){ const q=qualifyProb(team), w=koWinProb(team); return 3 + q*(1-Math.pow(w,5))/(1-w); }
function expRemainingMatches(team){
  const played=mPlayed(team);
  if(played>=3 && !hasMore(team)) return 0;
  const q=qualifyProb(team), w=koWinProb(team);
  if(played<3) return (3-played) + q*(1-Math.pow(w,5))/(1-w);
  const r=Math.max(8-played,0);
  return (1-Math.pow(w,r))/(1-w);
}
function getDyn(team){
  if(xgtOverrides[team]!==undefined) return xgtOverrides[team];
  const scored=goals[team]||0;
  const played=mPlayed(team);
  if(played>=3 && !hasMore(team)) return scored;
  const priorRate=(XGT_BASE[team]||3)/expBaseMatches(team);
  const lambda=(PRIOR_K*priorRate + scored)/(PRIOR_K + played);
  return scored + lambda*expRemainingMatches(team);
}
function goalsHash(){ let h=20260616; for(const[t,g]of Object.entries(goals)){ h=(h+ t.length*131*(g+1))>>>0; } return h>>>0; }
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296; }; }
function poisson(lam,rng){ if(lam<=0) return 0; const L=Math.exp(-lam);let k=0,p=1;do{k++;p*=rng();}while(p>L);return k-1; }

function runSim(){
  lastCalib=new Date();
  const teams=Object.keys(TEAM_POT);
  const dyn={}; teams.forEach(t=>dyn[t]=getDyn(t));
  const rng=mulberry32(goalsHash());
  const winCount={},ptsSum={};
  PARTICIPANTS.forEach(p=>{winCount[p.name]=0;ptsSum[p.name]=0;});
  for(let s=0;s<N_SIMS;s++){
    const fg={};
    for(const t of teams){ const cur=goals[t]||0; fg[t]=cur+poisson(Math.max(dyn[t]-cur,0),rng); }
    let maxP=-1;const sc={};
    for(const p of PARTICIPANTS){
      const pts=fg[p.p1]*POT_PTS[TEAM_POT[p.p1]]+fg[p.p2]*POT_PTS[TEAM_POT[p.p2]]+fg[p.p3]*POT_PTS[TEAM_POT[p.p3]]+fg[p.p4]*POT_PTS[TEAM_POT[p.p4]];
      sc[p.name]=pts;ptsSum[p.name]+=pts;if(pts>maxP)maxP=pts;
    }
    const winners=PARTICIPANTS.filter(p=>sc[p.name]===maxP);
    const share=1/winners.length;
    winners.forEach(w=>{winCount[w.name]+=share;});
  }
  return PARTICIPANTS.map(p=>({name:p.name,winPct:winCount[p.name]/N_SIMS*100,expPts:ptsSum[p.name]/N_SIMS}))
    .sort((a,b)=>b.winPct-a.winPct||b.expPts-a.expPts);
}
function topTeamsByStrength(){
  return Object.keys(TEAM_POT).filter(t=>!(mPlayed(t)>=3&&!hasMore(t))).sort((a,b)=>getDyn(b)-getDyn(a)).slice(0,3);
}
function makeVerdict(res){
  const a=res[0],b=res[1],c=res[2];
  const gap=a.winPct-b.winPct;
  let line;
  if(a.winPct<3) line=`📣 Still wide open — no runaway favourite yet. <b>${a.name}</b> just shades it on ${a.winPct.toFixed(1)}%.`;
  else if(gap>=5) line=`📣 <b>${a.name}</b> is the standout favourite to win the pool at ${a.winPct.toFixed(1)}%, clear of the chasing pack.`;
  else if(gap>=2) line=`📣 <b>${a.name}</b> leads the pool on ${a.winPct.toFixed(1)}%, with <b>${b.name}</b> breathing down their neck.`;
  else line=`📣 Too close to call: <b>${a.name}</b>, <b>${b.name}</b> and <b>${c.name}</b> are all in the fight.`;
  const tt=topTeamsByStrength().map(t=>`${FLAGS[t]||""} ${t}`).join(", ");
  return line+`<br><span style="color:var(--muted);font-size:12px">Form + odds favour these nations right now: ${tt}.</span>`;
}
function fmtCalib(){ return lastCalib?("Updated "+lastCalib.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})):"—"; }
function renderPredictor(){
  try{
    const results=runSim();
    const maxWin=Math.max(...results.map(r=>r.winPct),1);
    const top=results[0];
    let html=syncBarHTML();
    html+=`<div class="pred-intro">📊 <b>Who's winning the pool?</b><br>
      Our call, built from the bookmakers' odds on every nation plus how the teams are actually playing. It refreshes on its own after each match.</div>`;
    html+=`<div class="pred-verdict">${makeVerdict(results)}</div>`;
    html+=`<div class="calib-bar"><div class="calib-status">⚡ ${fmtCalib()} · auto-refresh on</div>
      <button class="btn-recalib" onclick="renderPredictor()">↺ Refresh now</button></div>`;
    html+=`<div class="pred-top"><div class="pred-top-lbl">Favourite to win the pool</div>
      <div class="pred-top-name">${top.name}</div>
      <div class="pred-top-sub">${top.winPct.toFixed(1)}% chance · ~${Math.round(top.expPts)} projected pts</div></div>`;
    results.forEach((r,i)=>{
      const w=Math.max(r.winPct/maxWin*100,r.winPct>0?2:0);
      const fillBg=i===0?"linear-gradient(90deg,#e3b878,#c87f4e)":"linear-gradient(90deg,#a35f33,#d9a06f)";
      html+=`<div class="pred-row-card"><div class="pred-row-head">
        <span class="pred-rank">#${i+1}</span><span class="pred-name">${r.name}</span>
        <span class="pred-pct" style="color:${i===0?'#e3b878':'#d9a06f'}">${r.winPct<0.1?'&lt;0.1':r.winPct.toFixed(1)}%</span>
        <span class="pred-exp">~${Math.round(r.expPts)}pts</span></div>
        <div class="pred-bar"><div class="pred-fill" style="width:${w}%;background:${fillBg}"></div></div></div>`;
    });
    html+=`<button class="pred-toggle" onclick="toggleStrength()">${showStrength?'▲ Hide team ratings':'▼ View / tweak team ratings'}</button>`;
    if(showStrength){
      html+=`<div class="str-help">Our current rating for each nation (their expected goals). <b style="color:#6fcf97">AUTO</b> updates from real form · <b style="color:#e3b878">MANUAL</b> is your tweak (↺ to revert). Eliminated teams locked.</div>`;
      [1,2,3,4].forEach(pot=>{
        html+=`<div class="pot-label">POT ${pot} · ${POT_PTS[pot]}pts/goal</div>`;
        Object.keys(TEAM_POT).sort().filter(t=>TEAM_POT[t]===pot).forEach(t=>{
          const played=mPlayed(t);
          const elim=played>=3&&!hasMore(t);
          const isManual=xgtOverrides[t]!==undefined;
          const dynVal=getDyn(t);
          if(elim){
            html+=`<div class="str-row elim"><span>${FLAGS[t]||""} ${t}<span class="tag-elim">OUT</span></span>
              <span style="color:var(--dim);font-size:12px">${goals[t]||0} ⚽ final</span></div>`;
          } else {
            const tag=isManual?'<span class="tag-manual">MANUAL</span>':'<span class="tag-auto">AUTO</span>';
            const resetBtn=isManual?`<button class="btn-reset" title="Reset to auto" onclick="resetXgt('${t}')">↺</button>`:'';
            html+=`<div class="str-row active"><span>${FLAGS[t]||""} ${t}${tag}<span class="meta-mini">${played}p</span></span>
              <div class="str-ctrl">
                <button class="btn-minus" onclick="adjXgt('${t}',-0.5)">−</button>
                <span class="str-val">${dynVal.toFixed(1)}</span>
                <button class="btn-plus" onclick="adjXgt('${t}',0.5)">+</button>
                ${resetBtn}
              </div></div>`;
          }
        });
      });
    }
    html+=`<div class="note">⚠️ A prediction, not a guarantee. Refreshes automatically after every match (and hourly).</div>`;
    document.getElementById("tab-predictor").innerHTML=html;
    setSyncBtn(syncing);
  }catch(err){
    document.getElementById("tab-predictor").innerHTML='<div class="note" style="background:#3a1010;border-color:#822;color:#ff8080">⚠️ Predictor error: '+(err&&err.message?err.message:err)+'</div>';
  }
}
function toggleStrength(){ showStrength=!showStrength; renderPredictor(); }
function adjXgt(team,delta){ const cur=getDyn(team); xgtOverrides[team]=Math.max(0,Math.round((cur+delta)*2)/2); renderPredictor(); }
function resetXgt(team){ delete xgtOverrides[team]; renderPredictor(); }

/* ============ INIT + TIMERS ============ */
try{ render(); }catch(err){
  var el=document.getElementById("tab-leaderboard");
  if(el) el.innerHTML='<div class="note" style="background:#3a1010;border-color:#822;color:#ff8080">⚠️ '+(err&&err.message?err.message:err)+'</div>';
}
fetchScores();
setInterval(fetchScores, 3*60*1000);
setInterval(()=>{ if(activeTab==='predictor') renderPredictor(); else if(activeTab==='today') renderToday(); }, 60*60*1000);
</script>
