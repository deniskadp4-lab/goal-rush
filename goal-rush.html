      if(sc){ const arr=sc.et||sc.ft; if(Array.isArray(arr)&&arr.length===2){hg=arr[0];ag=arr[1];} }
      const played=hg!==null&&ag!==null;
      nm.push({home,away,hg:played?hg:"-",ag:played?ag:"-",date:m.date||"",played});
      if(played){
        if(home&&TEAM_POT[home]) ng[home]=(ng[home]||0)+hg;
        if(away&&TEAM_POT[away]) ng[away]=(ng[away]||0)+ag;
      }
    }
    goals=ng; matches=nm; lastSync=new Date().toISOString(); save();
  }catch(e){ syncError=e.message; }
  syncing=false; setSyncBtn(false); render();
}
function setSyncBtn(loading){
  const btn=document.getElementById("syncBtn"); if(!btn) return;
  btn.disabled=loading; btn.innerHTML=loading?`<span class="spin">⟳</span> Syncing…`:`⟳ Refresh`;
}

/* ============ LEADERBOARD HELPERS ============ */
function calcPts(p){ return [p.p1,p.p2,p.p3,p.p4].reduce((s,t)=>s+(goals[t]||0)*POT_PTS[TEAM_POT[t]],0); }
function fl(t){ return (FLAGS[t]||"")+" "+t; }
function getLeaderboard(){ return PARTICIPANTS.map(p=>({...p,pts:calcPts(p)})).sort((a,b)=>b.pts-a.pts||a.name.localeCompare(b.name)); }
function fmtSync(){ if(!lastSync) return "Not synced yet"; return "Updated "+new Date(lastSync).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }
function syncBarHTML(){
  const errLine=syncError?`<div class="sync-error">⚠️ ${syncError}</div>`:"";
  return `<div class="sync-bar"><div class="sync-info"><strong>openfootball · GitHub</strong><div class="sync-time">${fmtSync()}</div>${errLine}</div>
    <button class="btn-sync" id="syncBtn" onclick="fetchScores()">⟳ Refresh</button></div>`;
}

/* ============ TAB ROUTING ============ */
let activeTab="leaderboard";
function showTab(tab){
  activeTab=tab;
  ["leaderboard","picks","goals","predictor"].forEach((t,i)=>{
    document.getElementById("tab-"+t).style.display=t===tab?"block":"none";
    document.querySelectorAll(".tab")[i].classList.toggle("active",t===tab);
  });
  render();
}
function render(){
  if(activeTab==="leaderboard") renderLeaderboard();
  else if(activeTab==="picks") renderPicks();
  else if(activeTab==="goals") renderGoals();
  else renderPredictor();
}

/* ============ LEADERBOARD ============ */
let prevLeader=null;
function renderLeaderboard(){
  const lb=getLeaderboard(); let rank=1,html=syncBarHTML();
  const leaderName=lb.length?lb[0].name:null;
  lb.forEach((p,i)=>{
    if(i>0&&lb[i-1].pts!==p.pts) rank=i+1;
    const medal=rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":null,top=rank<=3;
    const isChamp=(i===0);
    const champCls=isChamp?(p.name!==prevLeader?"champion just-crowned":"champion"):"";
    html+=`<div class="card ${top?"top":""} ${champCls}"><div class="rank ${medal?"medal":""}">${medal||"#"+rank}</div>
      <div class="info"><div class="pname ${top?"gold":""}">${p.name}</div>
      <div class="picks">${fl(p.p1)} · ${fl(p.p2)} · ${fl(p.p3)} · ${fl(p.p4)}</div></div>
      <div class="pts-box"><div class="pts ${top?"gold":""}">${p.pts}</div><div class="lbl">pts</div></div></div>`;
  });
  document.getElementById("tab-leaderboard").innerHTML=html;
  prevLeader=leaderName;
  setSyncBtn(syncing);
}

/* ============ PICKS ============ */
function renderPicks(){
  const lb=getLeaderboard();
  let html=`<div class="sub-label">Pot 1=3pts/goal · Pot 2=6pts · Pot 3=9pts · Pot 4=12pts</div>`+syncBarHTML();
  lb.forEach(p=>{
    let rows="";
    [p.p1,p.p2,p.p3,p.p4].forEach(t=>{ const g=goals[t]||0,e=g*POT_PTS[TEAM_POT[t]];
      rows+=`<div class="pick-row ${e>0?"earned":""}"><span class="pick-team">${fl(t)}</span><span class="pick-pts ${e>0?"earned":""}">+${e}</span></div>`; });
    html+=`<div class="pick-card"><div class="pick-header"><span style="font-weight:700;font-size:15px">${p.name}</span>
      <span style="font-weight:900;font-size:18px;color:#5aba6e">${p.pts} pts</span></div>
      <div class="pick-grid">${rows}</div><div class="tiebreak">🏆 Tiebreaker: ${fl(p.tb)}</div></div>`;
  });
  document.getElementById("tab-picks").innerHTML=html; setSyncBtn(syncing);
}

/* ============ GOALS ============ */
function renderGoals(){
  const played=[...matches].filter(m=>m.played).reverse().slice(0,25);
  let matchHTML="";
  if(played.length){
    matchHTML=`<div class="section-title">✅ Results (${played.length} matches)</div>`;
    played.forEach(m=>{matchHTML+=`<div class="match-row"><span class="match-teams">${FLAGS[m.home]||""} ${m.home} vs ${FLAGS[m.away]||""} ${m.away}</span>
      <span class="match-score">${m.hg} – ${m.ag}</span><span class="match-date">${m.date}</span></div>`;});
  }
  const scored=Object.entries(goals).filter(([,g])=>g>0).sort((a,b)=>b[1]-a[1]);
  let rows=scored.length?scored.map(([t,g])=>`<div class="goal-row">
    <div><span class="goal-team">${FLAGS[t]||""} ${t}</span><span class="goal-meta">Pot ${TEAM_POT[t]} · ${POT_PTS[TEAM_POT[t]]}pts/goal</span></div>
    <div class="goal-right"><span class="goal-count">${g} ⚽</span>
    <button class="btn-minus" onclick="adj('${t}',-1)">−</button>
    <button class="btn-plus" onclick="adj('${t}',1)">+</button></div></div>`).join("")
    :`<div style="color:#556b60;font-size:13px;text-align:center;padding:20px">No goals yet — press Refresh</div>`;
  const opts=Object.keys(TEAM_POT).sort().map(t=>`<option value="${t}">${FLAGS[t]||""} ${t} (Pot ${TEAM_POT[t]})</option>`).join("");
  document.getElementById("tab-goals").innerHTML=`${syncBarHTML()}${matchHTML}
    <div class="section-title" style="margin-top:8px">Goals Tally</div>${rows}
    <div class="editor-box" style="margin-top:14px"><label>✏️ Manual override</label>
    <div class="editor-row"><select id="editTeam"><option value="">Select team…</option>${opts}</select>
    <input type="number" id="editVal" min="0" placeholder="Goals">
    <button class="btn-set" onclick="setGoal()">Set</button></div></div>
    <div class="note">ℹ️ Penalty shootout goals do NOT count · Regular time + extra time only</div>`;
  setSyncBtn(syncing);
}
function setGoal(){ const t=document.getElementById("editTeam").value,v=parseInt(document.getElementById("editVal").value);
  if(t&&!isNaN(v)&&v>=0){ goals[t]=v; if(!v) delete goals[t]; save(); render(); } }
function adj(t,d){ goals[t]=Math.max(0,(goals[t]||0)+d); if(!goals[t]) delete goals[t]; save(); render(); }

/* ============ PREDICTOR (engine hidden, result only) ============ */
const N_SIMS = 10000;
const PRIOR_K = 4;
let xgtOverrides = {};
let showStrength = false;
let lastCalib = null;

function mPlayed(team){ return matches.filter(m=>m.played&&(m.home===team||m.away===team)).length; }
function hasMore(team){ return matches.some(m=>!m.played&&(m.home===team||m.away===team)); }
function qualifyProb(team){ const s=XGT_BASE[team]||3; return Math.min(0.93, Math.max(0.20, 0.25 + (s-2)/11*0.67)); }
function koWinProb(team){   const s=XGT_BASE[team]||3; return Math.min(0.65, Math.max(0.30, 0.30 + (s-2)/11*0.32)); }
function expBaseMatches(team){ const q=qualifyProb(team), w=koWinProb(team); return 3 + q*(1-Math.pow(w,5))/(1-w); }
function expRemainingMatches(team){
  const played=mPlayed(team);
  if(played>=3 && !hasMore(team)) return 0;
  const q=qualifyProb(team), w=koWinProb(team);
  if(played<3) return (3-played) + q*(1-Math.pow(w,5))/(1-w);
  const r=Math.max(8-played,0);
  return (1-Math.pow(w,r))/(1-w);
}
function getDyn(team){
  if(xgtOverrides[team]!==undefined) return xgtOverrides[team];
  const scored=goals[team]||0;
  const played=mPlayed(team);
  if(played>=3 && !hasMore(team)) return scored;
  const priorRate=(XGT_BASE[team]||3)/expBaseMatches(team);
  const lambda=(PRIOR_K*priorRate + scored)/(PRIOR_K + played);
  return scored + lambda*expRemainingMatches(team);
}
function goalsHash(){ let h=20260616; for(const[t,g]of Object.entries(goals)){ h=(h+ t.length*131*(g+1))>>>0; } return h>>>0; }
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296; }; }
function poisson(lam,rng){ if(lam<=0) return 0; const L=Math.exp(-lam);let k=0,p=1;do{k++;p*=rng();}while(p>L);return k-1; }

function runSim(){
  lastCalib=new Date();
  const teams=Object.keys(TEAM_POT);
  const dyn={}; teams.forEach(t=>dyn[t]=getDyn(t));
  const rng=mulberry32(goalsHash());
  const winCount={},ptsSum={};
  PARTICIPANTS.forEach(p=>{winCount[p.name]=0;ptsSum[p.name]=0;});
  for(let s=0;s<N_SIMS;s++){
    const fg={};
    for(const t of teams){ const cur=goals[t]||0; fg[t]=cur+poisson(Math.max(dyn[t]-cur,0),rng); }
    let maxP=-1;const sc={};
    for(const p of PARTICIPANTS){
      const pts=fg[p.p1]*POT_PTS[TEAM_POT[p.p1]]+fg[p.p2]*POT_PTS[TEAM_POT[p.p2]]+fg[p.p3]*POT_PTS[TEAM_POT[p.p3]]+fg[p.p4]*POT_PTS[TEAM_POT[p.p4]];
      sc[p.name]=pts;ptsSum[p.name]+=pts;if(pts>maxP)maxP=pts;
    }
    const winners=PARTICIPANTS.filter(p=>sc[p.name]===maxP);
    const share=1/winners.length;
    winners.forEach(w=>{winCount[w.name]+=share;});
  }
  return PARTICIPANTS.map(p=>({name:p.name,winPct:winCount[p.name]/N_SIMS*100,expPts:ptsSum[p.name]/N_SIMS}))
    .sort((a,b)=>b.winPct-a.winPct||b.expPts-a.expPts);
}

// Plain-language verdict, regenerated every refresh from the latest numbers
function topTeamsByStrength(){
  return Object.keys(TEAM_POT)
    .filter(t=>!(mPlayed(t)>=3&&!hasMore(t)))
    .sort((a,b)=>getDyn(b)-getDyn(a))
    .slice(0,3);
}
function makeVerdict(res){
  const a=res[0],b=res[1],c=res[2];
  const gap=a.winPct-b.winPct;
  let line;
  if(a.winPct<3) line=`📣 Still wide open — no runaway favourite yet. <b>${a.name}</b> just shades it on ${a.winPct.toFixed(1)}%.`;
  else if(gap>=5) line=`📣 <b>${a.name}</b> is the standout favourite to win the pool at ${a.winPct.toFixed(1)}%, clear of the chasing pack.`;
  else if(gap>=2) line=`📣 <b>${a.name}</b> leads the pool on ${a.winPct.toFixed(1)}%, with <b>${b.name}</b> breathing down their neck.`;
  else line=`📣 Too close to call: <b>${a.name}</b>, <b>${b.name}</b> and <b>${c.name}</b> are all in the fight.`;
  const tt=topTeamsByStrength().map(t=>`${FLAGS[t]||""} ${t}`).join(", ");
  return line+`<br><span style="color:#a8d5b0;font-size:12px">Form + odds favour these nations right now: ${tt}.</span>`;
}

function fmtCalib(){ return lastCalib?("Updated "+lastCalib.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})):"—"; }

function renderPredictor(){
  try{
    const results=runSim();
    const maxWin=Math.max(...results.map(r=>r.winPct),1);
    const top=results[0];
    let html=syncBarHTML();
    html+=`<div class="pred-intro">📊 <b>Who's winning the pool?</b><br>
      My call, built from the bookmakers' odds on every nation plus how the teams are actually playing. It refreshes on its own after each match.</div>`;
    html+=`<div class="pred-verdict">${makeVerdict(results)}</div>`;
    html+=`<div class="calib-bar"><div class="calib-status">⚡ ${fmtCalib()} · auto-refresh on</div>
      <button class="btn-recalib" onclick="renderPredictor()">↺ Refresh now</button></div>`;
    html+=`<div class="pred-top"><div class="pred-top-lbl">Favourite to win the pool</div>
      <div class="pred-top-name">${top.name}</div>
      <div class="pred-top-sub">${top.winPct.toFixed(1)}% chance · ~${Math.round(top.expPts)} projected pts</div></div>`;
    results.forEach((r,i)=>{
      const w=Math.max(r.winPct/maxWin*100,r.winPct>0?2:0);
      const fillBg=i===0?"linear-gradient(90deg,#ffd700,#ffaa00)":"linear-gradient(90deg,#2d8a3e,#5aba6e)";
      html+=`<div class="pred-row-card"><div class="pred-row-head">
        <span class="pred-rank">#${i+1}</span><span class="pred-name">${r.name}</span>
        <span class="pred-pct" style="color:${i===0?'#ffd700':'#5aba6e'}">${r.winPct<0.1?'&lt;0.1':r.winPct.toFixed(1)}%</span>
        <span class="pred-exp">~${Math.round(r.expPts)}pts</span></div>
        <div class="pred-bar"><div class="pred-fill" style="width:${w}%;background:${fillBg}"></div></div></div>`;
    });
    html+=`<button class="pred-toggle" onclick="toggleStrength()">${showStrength?'▲ Hide team ratings':'▼ View / tweak team ratings'}</button>`;
    if(showStrength){
      html+=`<div class="str-help">My current rating for each nation (their expected goals). <b style="color:#5aba6e">AUTO</b> updates from real form · <b style="color:#f0a030">MANUAL</b> is your tweak (↺ to revert). Eliminated teams locked.</div>`;
      [1,2,3,4].forEach(pot=>{
        html+=`<div class="pot-label">POT ${pot} · ${POT_PTS[pot]}pts/goal</div>`;
        Object.keys(TEAM_POT).sort().filter(t=>TEAM_POT[t]===pot).forEach(t=>{
          const played=mPlayed(t);
          const elim=played>=3&&!hasMore(t);
          const isManual=xgtOverrides[t]!==undefined;
          const dynVal=getDyn(t);
          if(elim){
            html+=`<div class="str-row elim"><span>${FLAGS[t]||""} ${t}<span class="tag-elim">OUT</span></span>
              <span style="color:#556b60;font-size:12px">${goals[t]||0} ⚽ final</span></div>`;
          } else {
            const tag=isManual?'<span class="tag-manual">MANUAL</span>':'<span class="tag-auto">AUTO</span>';
            const resetBtn=isManual?`<button class="btn-reset" title="Reset to auto" onclick="resetXgt('${t}')">↺</button>`:'';
            html+=`<div class="str-row active"><span>${FLAGS[t]||""} ${t}${tag}<span class="meta-mini">${played}p</span></span>
              <div class="str-ctrl">
                <button class="btn-minus" onclick="adjXgt('${t}',-0.5)">−</button>
                <span class="str-val">${dynVal.toFixed(1)}</span>
                <button class="btn-plus" onclick="adjXgt('${t}',0.5)">+</button>
                ${resetBtn}
              </div></div>`;
          }
        });
      });
    }
    html+=`<div class="note">⚠️ A prediction, not a guarantee. Refreshes automatically after every match (and hourly).</div>`;
    document.getElementById("tab-predictor").innerHTML=html;
    setSyncBtn(syncing);
  }catch(err){
    document.getElementById("tab-predictor").innerHTML='<div class="note" style="background:#3a1010;border-color:#822;color:#ff8080">⚠️ Predictor error: '+(err&&err.message?err.message:err)+'</div>';
  }
}

function toggleStrength(){ showStrength=!showStrength; renderPredictor(); }
function adjXgt(team,delta){ const cur=getDyn(team); xgtOverrides[team]=Math.max(0,Math.round((cur+delta)*2)/2); renderPredictor(); }
function resetXgt(team){ delete xgtOverrides[team]; renderPredictor(); }

/* ============ INIT + TIMERS ============ */
try{ render(); }catch(err){
  var el=document.getElementById("tab-leaderboard");
  if(el) el.innerHTML='<div class="note" style="background:#3a1010;border-color:#822;color:#ff8080">⚠️ '+(err&&err.message?err.message:err)+'</div>';
}
fetchScores();
setInterval(fetchScores, 3*60*1000);                                            // scores every 3 min
setInterval(()=>{ if(activeTab==='predictor') renderPredictor(); }, 60*60*1000); // hourly recalibrate
</script>
</body>
</html>
